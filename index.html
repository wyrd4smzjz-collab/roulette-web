<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Magik Spin</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        html, body {
            height: 100%; margin: 0; padding: 0; overflow: hidden;
            background: #050505; color: white;
            font-family: 'Segoe UI', sans-serif;
        }
        body {
            display: flex; flex-direction: column;
            align-items: center; justify-content: space-between;
            padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom) 0;
        }
        #particles {
            position: fixed; inset: 0; z-index: 0;
            pointer-events: none; overflow: hidden;
        }
        .particle {
            position: absolute; bottom: -30px;
            animation: floatUp linear infinite;
            opacity: 0;
        }
        @keyframes floatUp {
            0%   { transform: translateY(0) scale(1);   opacity: 0; }
            10%  { opacity: 1; }
            90%  { opacity: 0.6; }
            100% { transform: translateY(-110vh) scale(0.5); opacity: 0; }
        }
        .top-bar {
            width: 100%; padding: 10px 0 4px;
            display: flex; justify-content: center; position: relative;
            flex-shrink: 0; z-index: 2;
        }
        .wallet-btn {
            position: fixed; right: 15px;
            top: calc(env(safe-area-inset-top) + 12px);
            z-index: 200;
            background: rgba(142,68,173,0.3); border: 1px solid #8e44ad;
            color: white; border-radius: 8px; padding: 6px 12px;
            font-size: 0.8em; cursor: pointer;
        }

        /* СТРОКА: баланс слева, персонаж справа */
        #bal-row {
            width: 90%; max-width: 310px;
            display: flex; align-items: center;
            justify-content: space-between;
            flex-shrink: 0; z-index: 2;
            margin-top: 4px;
        }
        #bal-block {
            display: flex; flex-direction: column; align-items: flex-start;
        }
        #bal-label {
            font-size: 0.62em; font-weight: 700; letter-spacing: 1.5px;
            color: rgba(255,215,0,0.7); text-transform: uppercase; line-height: 1;
            margin-bottom: 2px;
        }
        .bal-display {
            font-size: 1.5em; font-weight: bold; color: gold;
            text-shadow: 0 0 12px rgba(255,215,0,0.6);
            line-height: 1;
        }
        /* ПЕРСОНАЖ */
        #char-canvas {
            width: 72px; height: 72px;
            flex-shrink: 0;
            filter: drop-shadow(0 0 6px rgba(142,68,173,0.5));
        }

        #sb-banner {
            position: fixed;
            top: calc(env(safe-area-inset-top) + 8px);
            left: 10px; z-index: 50;
            background: linear-gradient(135deg, #1a0f00, #2d1a00, #1a0f00);
            border: 1.5px solid #ffd700; border-radius: 10px;
            padding: 5px 12px 5px 8px;
            display: flex; align-items: center; gap: 6px;
            animation: sbPulse 2.2s ease-in-out infinite;
            pointer-events: none;
        }
        @keyframes sbPulse {
            0%,100% { box-shadow: 0 0 8px #ffd700, 0 0 20px #ffaa00, 0 0 35px rgba(255,136,0,.4); }
            50%      { box-shadow: 0 0 16px #ffd700, 0 0 36px #ffaa00, 0 0 65px rgba(255,136,0,.7); }
        }
        .sb-crown  { font-size: 20px; filter: drop-shadow(0 0 6px #ffd700); }
        .sb-text   { display: flex; flex-direction: column; line-height: 1.2; }
        .sb-label  { font-size: 8px; font-weight: 900; letter-spacing: 2px; color: #ffd700; text-transform: uppercase; }
        .sb-amount { font-size: 14px; font-weight: 900; color: #fff; text-shadow: 0 0 8px #ffd700; }
        .wheel-container {
            position: relative; width: 80vw; max-width: 310px;
            aspect-ratio: 1/1; flex-shrink: 0; z-index: 2;
        }
        canvas#canvas {
            width: 100%; height: 100%;
            filter: drop-shadow(0 0 15px #8e44ad); display: block;
        }
        #ptr {
            position: absolute; top: -10px; left: 50%;
            transform: translateX(-50%) rotate(0deg);
            transform-origin: 50% 100%;
            width: 0; height: 0;
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-top: 25px solid #f1c40f;
            z-index: 10;
            filter: drop-shadow(0 0 8px rgba(241,196,15,0.8));
        }
        #history-bar {
            width: 90%; max-width: 310px;
            display: flex; gap: 5px; overflow-x: auto;
            padding: 2px 0; scrollbar-width: none; flex-shrink: 0; z-index: 2;
        }
        #history-bar::-webkit-scrollbar { display: none; }
        .h-chip {
            flex-shrink: 0; border-radius: 20px; padding: 4px 10px;
            font-size: .72em; font-weight: bold; white-space: nowrap;
            opacity: 0; transform: scale(.5); animation: chipIn .3s forwards;
        }
        @keyframes chipIn { to { opacity: 1; transform: scale(1); } }
        .h-win  { background: rgba(39,174,96,.22);  border: 1px solid #27ae60; color: #2ecc71; }
        .h-lose { background: rgba(231,76,60,.22);   border: 1px solid #e74c3c; color: #e74c3c; }
        .h-free { background: rgba(52,152,219,.22);  border: 1px solid #3498db; color: #74b9ff; }
        .controls {
            width: 100%; text-align: center;
            padding-bottom: 18px; flex-shrink: 0; z-index: 2;
        }
        .bet-box {
            display: flex; align-items: center;
            justify-content: center; gap: 20px;
            margin-bottom: 15px;
        }
        #sound-btn {
            background: rgba(142,68,173,0.3); border: 1px solid #8e44ad;
            color: white; border-radius: 50%;
            width: 50px; height: 50px; font-size: 20px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
        }
        .btn-adj {
            background: #8e44ad; border: none; color: white;
            width: 50px; height: 50px; border-radius: 50%; font-size: 1.5em;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
        }
        .btn-adj:disabled { opacity: 0.4; cursor: not-allowed; }
        #fast-btn {
            background: rgba(142,68,173,0.3); border: 1px solid #8e44ad;
            color: white; border-radius: 50%;
            width: 50px; height: 50px; font-size: 22px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: all .2s;
        }
        #fast-btn.active {
            background: rgba(241,196,15,0.4); border-color: #f1c40f;
            box-shadow: 0 0 12px #f1c40f;
        }
        .spin-btn {
            width: 85%; padding: 18px; border-radius: 50px; border: none;
            color: white; font-weight: bold; font-size: 1.4em;
            background: #8e44ad; box-shadow: 0 0 25px #8e44ad;
            transition: all .3s; cursor: pointer;
        }
        .dep-mode  { background: #e74c3c !important; box-shadow: 0 0 25px #e74c3c !important; }
        .free-mode { background: #27ae60 !important; box-shadow: 0 0 25px #27ae60 !important; }
        #modal {
            display: none; position: fixed; inset: 0;
            background: #000; z-index: 300;
            flex-direction: column; overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }
        #modal.open { display: flex; }
        .tabs { display: flex; background: #1a1a1a; flex-shrink: 0; }
        .tab { flex: 1; padding: 20px; text-align: center; font-weight: bold; cursor: pointer; }
        .tab.active { border-bottom: 3px solid #8e44ad; color: #8e44ad; }
        .tab-content {
            display: none; padding: 28px 20px 80px;
            flex-direction: column; align-items: center; width: 100%;
        }
        .tab-content.active { display: flex; }
        .modal-input {
            width: 100%; padding: 15px; margin: 8px 0;
            border-radius: 12px; border: 1px solid #444;
            background: #111; color: white; font-size: 1.05em;
        }
        .modal-input:focus { outline: none; border-color: #8e44ad; }
        .m-hint    { color: #666; font-size: .8em; text-align: center; margin: 2px 0 8px; line-height: 1.5; }
        .m-warn    { color: #e74c3c; font-size: .85em; text-align: center; margin: 6px 0; }
        .m-preview { color: #0af; font-size: 1.1em; font-weight: bold; margin: 10px 0 2px; }
        .m-rate    { color: #777; font-size: .78em; text-align: center; margin-bottom: 6px; }
        .modal-btn {
            width: 100%; padding: 18px; border-radius: 50px; border: none;
            color: white; font-weight: bold; font-size: 1.2em;
            background: #8e44ad; box-shadow: 0 0 20px #8e44ad;
            margin-top: 14px; cursor: pointer;
        }
        .modal-btn.green { background: #27ae60; box-shadow: 0 0 20px #27ae60; }
        .back-link { margin-top: 24px; color: #777; font-size: .9em; cursor: pointer; }
    </style>
</head>
<body>

<div id="particles"></div>

<div id="sb-banner">
    <span class="sb-crown">👑</span>
    <div class="sb-text">
        <span class="sb-label">SuperBonus</span>
        <span class="sb-amount">500 TON</span>
    </div>
</div>

<button class="wallet-btn" onclick="openM()">Кошелек</button>

<div class="top-bar"></div>

<div class="wheel-container">
    <div id="ptr"></div>
    <canvas id="canvas" width="600" height="600"></canvas>
</div>

<!-- СТРОКА: баланс слева + персонаж справа -->
<div id="bal-row">
    <div id="bal-block">
        <span id="bal-label">БАЛАНС</span>
        <div class="bal-display">⭐ <span id="s_bal">0</span></div>
    </div>
    <canvas id="char-canvas" width="144" height="144"></canvas>
</div>

<div id="history-bar"></div>

<div class="controls">
    <div class="bet-box">
        <button id="sound-btn" onclick="toggleSound()">🔊</button>
        <button class="btn-adj" id="btn-minus" onclick="adjBet(-20)">-</button>
        <div>Ставка<br><b id="cur_bet">5</b> ⭐</div>
        <button class="btn-adj" id="btn-plus" onclick="adjBet(20)">+</button>
        <button id="fast-btn" onclick="toggleFast()">🐇</button>
    </div>
    <button id="spinBtn" class="spin-btn" onclick="handleSpin()">КРУТИТЬ</button>
</div>

<div id="modal">
    <div class="tabs">
        <div class="tab active" id="tab-dep" onclick="setTab('dep',this)">ПОПОЛНИТЬ</div>
        <div class="tab"        id="tab-wit" onclick="setTab('wit',this)">ВЫВОД</div>
    </div>
    <div id="dep" class="tab-content active">
        <h2 style="color:gold; margin-bottom:4px;">Пополнение ⭐</h2>
        <p class="m-warn">Минимум 10 ⭐</p>
        <input class="modal-input" type="number" id="dep_val"
               placeholder="Введите количество звёзд" min="10" inputmode="numeric">
        <p class="m-hint">Введите количество звёзд для пополнения баланса</p>
        <button class="modal-btn green" onclick="doDep()">КУПИТЬ ⭐</button>
        <p class="back-link" onclick="closeM()">← Назад</p>
    </div>
    <div id="wit" class="tab-content">
        <h2 style="color:#0088cc; margin-bottom:4px;">Вывод TON</h2>
        <p class="m-warn">Минимум 500 ⭐</p>
        <input class="modal-input" type="number" id="w_stars"
               placeholder="Сумма звёзд (мин. 500)" inputmode="numeric" oninput="calcWit()">
        <div class="m-preview" id="wit_preview">Вы получите: — TON</div>
        <p class="m-rate" id="rate-label">Курс: загрузка…</p>
        <input class="modal-input" type="text" id="w_addr" placeholder="Адрес TON (UQ...)">
        <input class="modal-input" type="text" id="w_memo" placeholder="MEMO / Tag">
        <p class="m-hint" style="font-size:.75em;">MEMO — если требуется биржей или кошельком</p>
        <button class="modal-btn" onclick="doWit()">ВЫВЕСТИ</button>
        <p class="back-link" onclick="closeM()">← Назад</p>
    </div>
</div>

<script>
const tg = window.Telegram.WebApp;
tg.expand();

let stars        = 0;
let curBet       = 5;
let isSpinning   = false;
let hasFreeSpins = 0;
let fastMode     = false;
let userId       = new URLSearchParams(location.search).get('uid') || 'unknown';

const MIN_WITHDRAW = 500;
const MIN_DEPOSIT  = 10;
let tonPerStar = 0.013333;

(async function fetchTonRate() {
    try {
        const res = await fetch(
            'https://api.coingecko.com/api/v3/simple/price?ids=the-open-network&vs_currencies=usd',
            { cache: 'no-cache' }
        );
        if (res.ok) {
            const json   = await res.json();
            const tonUsd = json['the-open-network']?.usd;
            if (tonUsd && tonUsd > 0) {
                tonPerStar = 0.013 / tonUsd;
                document.getElementById('rate-label').textContent =
                    `Курс: 1 ⭐ = ${tonPerStar.toFixed(5)} TON  (1 TON = $${tonUsd.toFixed(2)})`;
                calcWit(); return;
            }
        }
    } catch (_) {}
    document.getElementById('rate-label').textContent = `Курс: 1 ⭐ = ${tonPerStar.toFixed(5)} TON`;
})();

/* ── ЧАСТИЦЫ ── */
(function spawnParticles() {
    const container = document.getElementById('particles');
    const items = ['⭐','💫','✨','🌟','⭐','💎','⭐','✨'];
    function spawn() {
        const el = document.createElement('div');
        el.className = 'particle';
        el.textContent = items[Math.floor(Math.random() * items.length)];
        const size = 10 + Math.random() * 18;
        const dur  = 6 + Math.random() * 10;
        const delay = Math.random() * 8;
        el.style.cssText = `left:${Math.random()*100}%;font-size:${size}px;animation-duration:${dur}s;animation-delay:${delay}s;filter:blur(${Math.random()<0.4?1:0}px) drop-shadow(0 0 4px gold);`;
        container.appendChild(el);
        setTimeout(() => el.remove(), (dur + delay) * 1000);
    }
    for (let i = 0; i < 18; i++) spawn();
    setInterval(spawn, 1200);
})();

/* ══════════════════════════════════════
   ПЕРСОНАЖ — canvas 144×144
══════════════════════════════════════ */
const cc  = document.getElementById('char-canvas');
const cctx = cc.getContext('2d');

// Состояния: 'idle' | 'watching' | 'win' | 'lose'
let charMood = 'idle';
let charStateTimer = null;

// Внутреннее состояние анимации
let blinkT      = 0;   // время до следующего моргания
let blinkOpen   = 1;   // 0=закрыт, 1=открыт
let blinkClose  = 0;   // фаза закрытия
let lookX       = 0;   // смещение зрачков -1..1
let lookY       = 0;
let lookTargX   = 0;
let lookTargY   = 0;
let lookTimer   = 0;
let bouncePhase = 0;   // лёгкое подпрыгивание
let winBounce   = 0;   // прыжок при выигрыше
let winStars    = [];  // летящие звёздочки при выигрыше

function setCharMood(mood, duration) {
    charMood = mood;
    if (charStateTimer) clearTimeout(charStateTimer);
    if (duration) charStateTimer = setTimeout(() => { charMood = 'idle'; }, duration);
}

function drawChar(ts) {
    const W = 144, H = 144;
    cctx.clearRect(0, 0, W, H);

    // Параметры в зависимости от настроения
    const watching = charMood === 'watching';
    const win      = charMood === 'win';
    const lose     = charMood === 'lose';

    // Подпрыгивание
    bouncePhase += 0.04;
    let bobY = Math.sin(bouncePhase) * (win ? 5 : 1.5);
    if (win) { winBounce = Math.max(0, winBounce - 0.08); bobY += Math.sin(winBounce * 8) * winBounce * 18; }

    const cx = W / 2, cy = H / 2 - 4 + bobY;

    // --- Тело ---
    // Тело (туловище)
    cctx.beginPath();
    cctx.ellipse(cx, cy + 34, 22, 18, 0, 0, Math.PI * 2);
    cctx.fillStyle = win ? '#a855f7' : lose ? '#6b21a8' : '#8e44ad';
    cctx.fill();

    // Ручки
    if (win) {
        // Руки вверх
        cctx.beginPath();
        cctx.moveTo(cx - 20, cy + 28);
        cctx.quadraticCurveTo(cx - 38, cy + 10, cx - 32, cy - 2);
        cctx.strokeStyle = '#a855f7'; cctx.lineWidth = 7; cctx.lineCap = 'round'; cctx.stroke();
        cctx.beginPath();
        cctx.moveTo(cx + 20, cy + 28);
        cctx.quadraticCurveTo(cx + 38, cy + 10, cx + 32, cy - 2);
        cctx.strokeStyle = '#a855f7'; cctx.lineWidth = 7; cctx.stroke();
    } else if (lose) {
        // Руки вниз
        cctx.beginPath();
        cctx.moveTo(cx - 20, cy + 30);
        cctx.quadraticCurveTo(cx - 34, cy + 46, cx - 28, cy + 52);
        cctx.strokeStyle = '#6b21a8'; cctx.lineWidth = 7; cctx.lineCap = 'round'; cctx.stroke();
        cctx.beginPath();
        cctx.moveTo(cx + 20, cy + 30);
        cctx.quadraticCurveTo(cx + 34, cy + 46, cx + 28, cy + 52);
        cctx.strokeStyle = '#6b21a8'; cctx.lineWidth = 7; cctx.stroke();
    } else {
        // Обычные руки
        cctx.beginPath();
        cctx.moveTo(cx - 20, cy + 28);
        cctx.quadraticCurveTo(cx - 36, cy + 34, cx - 30, cy + 44);
        cctx.strokeStyle = '#8e44ad'; cctx.lineWidth = 7; cctx.lineCap = 'round'; cctx.stroke();
        cctx.beginPath();
        cctx.moveTo(cx + 20, cy + 28);
        cctx.quadraticCurveTo(cx + 36, cy + 34, cx + 30, cy + 44);
        cctx.strokeStyle = '#8e44ad'; cctx.lineWidth = 7; cctx.stroke();
    }

    // --- Голова ---
    const headR = 26;
    cctx.beginPath();
    cctx.arc(cx, cy, headR, 0, Math.PI * 2);
    const headGrad = cctx.createRadialGradient(cx - 6, cy - 6, 4, cx, cy, headR);
    headGrad.addColorStop(0, '#fde68a');
    headGrad.addColorStop(1, '#f59e0b');
    cctx.fillStyle = headGrad;
    cctx.fill();
    cctx.strokeStyle = 'rgba(0,0,0,0.15)'; cctx.lineWidth = 1.5; cctx.stroke();

    // Румянец
    if (win) {
        cctx.beginPath();
        cctx.ellipse(cx - 16, cy + 8, 7, 4, -0.3, 0, Math.PI * 2);
        cctx.fillStyle = 'rgba(255,100,100,0.35)'; cctx.fill();
        cctx.beginPath();
        cctx.ellipse(cx + 16, cy + 8, 7, 4, 0.3, 0, Math.PI * 2);
        cctx.fill();
    }

    // --- Глаза ---
    // Направление взгляда
    let pupilOffX = lookX * 3.5;
    let pupilOffY = lookY * 2.5;
    if (watching) { pupilOffX = -7; pupilOffY = -3; } // смотрит влево-вверх (на рулетку)
    if (lose)     { pupilOffX = 0;  pupilOffY = 3; }  // смотрит вниз

    const eyeLY = cy - 6, eyeRY = cy - 6;
    const eyeLX = cx - 10, eyeRX = cx + 10;

    // Открытость глаз
    let eyeH = 8 * blinkOpen;
    if (eyeH < 0.5) eyeH = 0.5;

    // Белки
    cctx.beginPath();
    cctx.ellipse(eyeLX, eyeLY, 7, eyeH, 0, 0, Math.PI * 2);
    cctx.fillStyle = 'white'; cctx.fill();
    cctx.beginPath();
    cctx.ellipse(eyeRX, eyeRY, 7, eyeH, 0, 0, Math.PI * 2);
    cctx.fill();

    // Зрачки (только если глаза открыты)
    if (blinkOpen > 0.3) {
        cctx.beginPath();
        cctx.arc(eyeLX + pupilOffX, eyeLY + pupilOffY, 3.5, 0, Math.PI * 2);
        cctx.fillStyle = '#1a0a2e'; cctx.fill();
        cctx.beginPath();
        cctx.arc(eyeRX + pupilOffX, eyeRY + pupilOffY, 3.5, 0, Math.PI * 2);
        cctx.fill();
        // Блик
        cctx.beginPath();
        cctx.arc(eyeLX + pupilOffX + 1.2, eyeLY + pupilOffY - 1.2, 1.2, 0, Math.PI * 2);
        cctx.fillStyle = 'rgba(255,255,255,0.9)'; cctx.fill();
        cctx.beginPath();
        cctx.arc(eyeRX + pupilOffX + 1.2, eyeRY + pupilOffY - 1.2, 1.2, 0, Math.PI * 2);
        cctx.fill();
    }

    // Брови
    cctx.lineWidth = 2.5; cctx.lineCap = 'round';
    if (lose) {
        // Грустные — изогнуты вниз к центру
        cctx.beginPath();
        cctx.moveTo(eyeLX - 7, eyeLY - 12);
        cctx.quadraticCurveTo(eyeLX, eyeLY - 9, eyeLX + 5, eyeLY - 13);
        cctx.strokeStyle = '#92400e'; cctx.stroke();
        cctx.beginPath();
        cctx.moveTo(eyeRX - 5, eyeRY - 13);
        cctx.quadraticCurveTo(eyeRX, eyeRY - 9, eyeRX + 7, eyeRY - 12);
        cctx.stroke();
    } else if (win) {
        // Радостные — высоко приподняты
        cctx.beginPath();
        cctx.moveTo(eyeLX - 7, eyeLY - 14);
        cctx.quadraticCurveTo(eyeLX, eyeLY - 18, eyeLX + 6, eyeLY - 14);
        cctx.strokeStyle = '#92400e'; cctx.stroke();
        cctx.beginPath();
        cctx.moveTo(eyeRX - 6, eyeRY - 14);
        cctx.quadraticCurveTo(eyeRX, eyeRY - 18, eyeRX + 7, eyeRY - 14);
        cctx.stroke();
    } else {
        // Обычные
        cctx.beginPath();
        cctx.moveTo(eyeLX - 7, eyeLY - 12);
        cctx.quadraticCurveTo(eyeLX, eyeLY - 14, eyeLX + 6, eyeLY - 12);
        cctx.strokeStyle = '#92400e'; cctx.stroke();
        cctx.beginPath();
        cctx.moveTo(eyeRX - 6, eyeRY - 12);
        cctx.quadraticCurveTo(eyeRX, eyeRY - 14, eyeRX + 7, eyeRY - 12);
        cctx.stroke();
    }

    // --- Рот ---
    const mouthY = cy + 11;
    cctx.beginPath();
    cctx.lineWidth = 2.8; cctx.lineCap = 'round';
    if (win) {
        // Широкая улыбка
        cctx.moveTo(cx - 12, mouthY - 2);
        cctx.quadraticCurveTo(cx, mouthY + 11, cx + 12, mouthY - 2);
        cctx.strokeStyle = '#92400e'; cctx.stroke();
        // Зубы
        cctx.beginPath();
        cctx.ellipse(cx, mouthY + 3, 8, 4, 0, 0, Math.PI);
        cctx.fillStyle = 'white'; cctx.fill();
    } else if (lose) {
        // Дужка вниз (грусть)
        cctx.moveTo(cx - 10, mouthY + 4);
        cctx.quadraticCurveTo(cx, mouthY - 4, cx + 10, mouthY + 4);
        cctx.strokeStyle = '#92400e'; cctx.stroke();
        // Слеза
        cctx.beginPath();
        cctx.moveTo(eyeRX + 2, eyeRY + 8);
        cctx.bezierCurveTo(eyeRX + 5, eyeRY + 14, eyeRX + 2, eyeRY + 18, eyeRX, eyeRY + 20);
        cctx.bezierCurveTo(eyeRX - 3, eyeRY + 18, eyeRX - 3, eyeRY + 14, eyeRX + 2, eyeRY + 8);
        cctx.fillStyle = 'rgba(100,180,255,0.85)'; cctx.fill();
    } else if (watching) {
        // Приоткрытый рот — напряжение
        cctx.moveTo(cx - 8, mouthY);
        cctx.quadraticCurveTo(cx, mouthY + 5, cx + 8, mouthY);
        cctx.strokeStyle = '#92400e'; cctx.stroke();
    } else {
        // Лёгкая улыбка
        cctx.moveTo(cx - 9, mouthY);
        cctx.quadraticCurveTo(cx, mouthY + 7, cx + 9, mouthY);
        cctx.strokeStyle = '#92400e'; cctx.stroke();
    }

    // Звёздочки при выигрыше
    if (win) {
        winStars.forEach(s => {
            cctx.font = `${s.size}px serif`;
            cctx.globalAlpha = s.alpha;
            cctx.fillText('⭐', s.x, s.y);
            cctx.globalAlpha = 1;
        });
    }
}

/* Обновление логики персонажа */
let lastCharTs = 0;
function updateChar(ts) {
    const dt = Math.min((ts - lastCharTs) / 1000, 0.05);
    lastCharTs = ts;

    // Моргание
    blinkT -= dt;
    if (blinkT <= 0) {
        if (blinkOpen > 0.5) {
            // Начинаем закрывать
            blinkOpen = Math.max(0, blinkOpen - dt * 18);
            if (blinkOpen <= 0) { blinkOpen = 0; blinkT = 0.08; }
        } else {
            // Открываем
            blinkOpen = Math.min(1, blinkOpen + dt * 18);
            if (blinkOpen >= 1) { blinkOpen = 1; blinkT = 2.5 + Math.random() * 3; }
        }
    }

    // Взгляд (только в idle)
    if (charMood === 'idle') {
        lookTimer -= dt;
        if (lookTimer <= 0) {
            lookTargX = (Math.random() * 2 - 1);
            lookTargY = (Math.random() * 2 - 1) * 0.6;
            lookTimer = 1.5 + Math.random() * 2.5;
        }
        lookX += (lookTargX - lookX) * dt * 4;
        lookY += (lookTargY - lookY) * dt * 4;
    }

    // Звёзды при выигрыше
    if (charMood === 'win') {
        winStars = winStars.filter(s => s.alpha > 0);
        winStars.forEach(s => {
            s.y -= dt * 30;
            s.x += s.vx * dt;
            s.alpha -= dt * 0.6;
        });
        if (Math.random() < 0.25) {
            winStars.push({
                x: 20 + Math.random() * 104,
                y: 60 + Math.random() * 30,
                vx: (Math.random() - 0.5) * 40,
                size: 10 + Math.random() * 10,
                alpha: 1
            });
        }
    } else {
        winStars = [];
    }
}

function charLoop(ts) {
    updateChar(ts);
    drawChar(ts);
    requestAnimationFrame(charLoop);
}
requestAnimationFrame(charLoop);

/* Публичные функции смены настроения */
function charSpin()  { setCharMood('watching'); winBounce = 0; }
function charWin()   { setCharMood('win', 4000); winBounce = Math.PI; }
function charLose()  { setCharMood('lose', 3500); }
function charFree()  { setCharMood('win', 3000); winBounce = Math.PI * 0.7; }
/* ══════════════════════════════════════ */

let soundEnabled = true;
let bgLoopTimer  = null;
let bgGainNode   = null;
const actx       = new (window.AudioContext || window.webkitAudioContext)();

function resumeAudio() {
    return actx.state === 'suspended' ? actx.resume() : Promise.resolve();
}

function startBgMusic() {
    if (!soundEnabled || bgLoopTimer) return;
    bgGainNode = actx.createGain();
    bgGainNode.gain.value = 0.05;
    bgGainNode.connect(actx.destination);
    const melody = [
        [523.25,0.00,0.35],[659.25,0.45,0.35],[783.99,0.90,0.35],
        [1046.5,1.35,0.55],[783.99,2.00,0.25],[659.25,2.35,0.25],
        [523.25,2.70,0.35],[493.88,3.15,0.35],[392.00,3.60,0.35],
        [523.25,4.00,0.40],[659.25,4.50,0.35],[783.99,4.95,0.35],
        [880.00,5.40,0.55],[783.99,6.05,0.25],[659.25,6.40,0.25],[523.25,6.75,0.90]
    ];
    const bass = [[130.81,0],[130.81,1.35],[98,2.7],[130.81,4.0],[130.81,5.4]];
    const LOOP = 8.0;
    function schedule(t0) {
        if (!bgGainNode) return;
        melody.forEach(([f,t,d]) => {
            const o = actx.createOscillator(), g = actx.createGain();
            o.connect(g); g.connect(bgGainNode);
            o.type = 'triangle'; o.frequency.value = f;
            const s = t0 + t;
            g.gain.setValueAtTime(0, s);
            g.gain.linearRampToValueAtTime(0.6, s + 0.03);
            g.gain.exponentialRampToValueAtTime(0.001, s + d);
            o.start(s); o.stop(s + d + 0.05);
        });
        bass.forEach(([f,t]) => {
            const o = actx.createOscillator(), g = actx.createGain();
            o.connect(g); g.connect(bgGainNode);
            o.type = 'sine'; o.frequency.value = f;
            const s = t0 + t;
            g.gain.setValueAtTime(0, s);
            g.gain.linearRampToValueAtTime(0.4, s + 0.05);
            g.gain.exponentialRampToValueAtTime(0.001, s + 0.5);
            o.start(s); o.stop(s + 0.6);
        });
    }
    let t = actx.currentTime + 0.1;
    schedule(t);
    bgLoopTimer = setInterval(() => {
        if (!soundEnabled) { stopBgMusic(); return; }
        t += LOOP; schedule(t);
    }, (LOOP - 0.4) * 1000);
}

function stopBgMusic() {
    if (bgLoopTimer) { clearInterval(bgLoopTimer); bgLoopTimer = null; }
    if (bgGainNode)  { bgGainNode.gain.linearRampToValueAtTime(0, actx.currentTime + 0.3); bgGainNode = null; }
}

function toggleSound() {
    soundEnabled = !soundEnabled;
    document.getElementById('sound-btn').textContent = soundEnabled ? '🔊' : '🔇';
    if (soundEnabled) resumeAudio().then(startBgMusic);
    else stopBgMusic();
}

function playTone(freq, type, dur, vol) {
    if (!soundEnabled) return;
    const o = actx.createOscillator(), g = actx.createGain();
    o.connect(g); g.connect(actx.destination);
    o.type = type; o.frequency.value = freq;
    g.gain.setValueAtTime(vol, actx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, actx.currentTime + dur);
    o.start(); o.stop(actx.currentTime + dur);
}
function playWin()  { [523,659,783,1046].forEach((f,i) => setTimeout(() => playTone(f,'triangle',0.3,0.3), i*80)); }
function playLose() { [300,220,160].forEach((f,i) => setTimeout(() => playTone(f,'sawtooth',0.2,0.2), i*100)); }
function playFree() { [659,880,1108].forEach((f,i) => setTimeout(() => playTone(f,'sine',0.25,0.25), i*90)); }
function playClick() {
    if (!soundEnabled) return;
    playTone(800, 'square', 0.05, 0.1);
    if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
}

let ratchetTimer = null;
function startRatchet(ms) {
    stopRatchet();
    ratchetTimer = setInterval(() => {
        if (!soundEnabled || actx.state === 'suspended') return;
        const o = actx.createOscillator(), g = actx.createGain();
        o.connect(g); g.connect(actx.destination);
        o.type = 'square'; o.frequency.value = 900;
        g.gain.setValueAtTime(0.07, actx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001, actx.currentTime + 0.04);
        o.start(); o.stop(actx.currentTime + 0.04);
    }, ms);
}
function stopRatchet() { if (ratchetTimer) { clearInterval(ratchetTimer); ratchetTimer = null; } }

const SUPERBONUS_IDX = 7;
const sectors = [
    { t:'💀',   c:'#1a1a1a', mult:0,   weight:12.5,  isSB:false, isFree:false },
    { t:'×1',   c:'#555555', mult:1,   weight:6.25,  isSB:false, isFree:false },
    { t:'×2',   c:'#3498db', mult:2,   weight:7.5,   isSB:false, isFree:false },
    { t:'💀',   c:'#1a1a1a', mult:0,   weight:12.5,  isSB:false, isFree:false },
    { t:'×1',   c:'#555555', mult:1,   weight:6.25,  isSB:false, isFree:false },
    { t:'×5',   c:'#9b59b6', mult:5,   weight:6,     isSB:false, isFree:false },
    { t:'💀',   c:'#1a1a1a', mult:0,   weight:12.5,  isSB:false, isFree:false },
    { t:'★SB',  c:'#7a4800', mult:0,   weight:0,     isSB:true,  isFree:false },
    { t:'×1',   c:'#555555', mult:1,   weight:6.25,  isSB:false, isFree:false },
    { t:'×10',  c:'#f39c12', mult:10,  weight:3,     isSB:false, isFree:false },
    { t:'FREE', c:'#27ae60', mult:0,   weight:0.005, isSB:false, isFree:true  },
    { t:'💀',   c:'#1a1a1a', mult:0,   weight:12.5,  isSB:false, isFree:false },
    { t:'×100', c:'#e74c3c', mult:100, weight:0.99,  isSB:false, isFree:false },
    { t:'×1',   c:'#555555', mult:1,   weight:6.25,  isSB:false, isFree:false },
    { t:'×2',   c:'#3498db', mult:2,   weight:7.5,   isSB:false, isFree:false },
    { t:'FREE', c:'#27ae60', mult:0,   weight:0.005, isSB:false, isFree:true  }
];

const N   = sectors.length;
const ARC = (Math.PI * 2) / N;

const canvas = document.getElementById('canvas');
const ctx    = canvas.getContext('2d');
let curAngle = 0;

let hlIdx = -1, hlPhase = 0, hlRemain = 0, hlRAF = null;

function draw(angle, hi, phase) {
    ctx.clearRect(0, 0, 600, 600);
    sectors.forEach((s, i) => {
        const a = i * ARC + angle;
        if (s.isSB) {
            const gr = ctx.createRadialGradient(300,300,60,300,300,280);
            gr.addColorStop(0,'#fff3a0'); gr.addColorStop(0.3,'#ffd700');
            gr.addColorStop(0.7,'#cc8800'); gr.addColorStop(1,'#7a4800');
            ctx.beginPath(); ctx.fillStyle = gr;
            ctx.moveTo(300,300); ctx.arc(300,300,280,a,a+ARC); ctx.fill();
            ctx.save();
            ctx.shadowColor = '#ffd700'; ctx.shadowBlur = 28;
            ctx.beginPath(); ctx.strokeStyle = '#ffd700'; ctx.lineWidth = 4;
            ctx.moveTo(300,300); ctx.arc(300,300,278,a,a+ARC); ctx.lineTo(300,300); ctx.stroke();
            ctx.restore();
        } else {
            ctx.beginPath(); ctx.fillStyle = s.c;
            ctx.moveTo(300,300); ctx.arc(300,300,280,a,a+ARC); ctx.fill();
        }
        if (i === hi && hlRemain > 0) {
            const pulse = 0.45 + 0.55 * Math.abs(Math.sin(phase * 0.009));
            ctx.save();
            const hg = ctx.createRadialGradient(300,300,80,300,300,280);
            hg.addColorStop(0,`rgba(255,255,180,${0.22*pulse})`);
            hg.addColorStop(0.6,`rgba(255,210,0,${0.4*pulse})`);
            hg.addColorStop(1,`rgba(255,160,0,0)`);
            ctx.beginPath(); ctx.fillStyle = hg;
            ctx.moveTo(300,300); ctx.arc(300,300,280,a,a+ARC); ctx.fill();
            ctx.shadowColor = `rgba(255,220,50,${pulse})`; ctx.shadowBlur = 32;
            ctx.beginPath();
            ctx.strokeStyle = `rgba(255,230,60,${0.95*pulse})`; ctx.lineWidth = 9;
            ctx.moveTo(300,300); ctx.arc(300,300,274,a,a+ARC); ctx.lineTo(300,300); ctx.stroke();
            ctx.restore();
        }
        ctx.beginPath(); ctx.strokeStyle = 'rgba(255,255,255,0.1)'; ctx.lineWidth = 1;
        ctx.moveTo(300,300); ctx.arc(300,300,280,a,a+ARC); ctx.lineTo(300,300); ctx.stroke();
        ctx.save(); ctx.translate(300,300); ctx.rotate(a + ARC/2);
        if (s.isSB) {
            ctx.shadowColor = '#ffd700'; ctx.shadowBlur = 16;
            ctx.fillStyle = '#fff'; ctx.font = 'bold 13px Arial';
            ctx.fillText('SUPER', 118, -8); ctx.fillText('BONUS', 118, 8);
            ctx.font = 'bold 10px Arial'; ctx.fillStyle = '#ffe066';
            ctx.fillText('500 TON', 116, 24); ctx.shadowBlur = 0;
        } else {
            ctx.fillStyle = 'white'; ctx.font = 'bold 24px Arial';
            ctx.fillText(s.t, 148, 8);
        }
        ctx.restore();
    });
}

function startHighlight(idx) {
    hlIdx = idx; hlRemain = 4000; hlPhase = 0;
    let last = null;
    function loop(now) {
        if (!last) last = now;
        const dt = now - last; last = now;
        hlRemain -= dt; hlPhase += dt;
        draw(curAngle, hlRemain > 0 ? hlIdx : -1, hlPhase);
        if (hlRemain > 0) hlRAF = requestAnimationFrame(loop);
        else { hlIdx = -1; draw(curAngle, -1, 0); }
    }
    if (hlRAF) cancelAnimationFrame(hlRAF);
    hlRAF = requestAnimationFrame(loop);
}

const ptrEl = document.getElementById('ptr');
let ptrAngle = 0, ptrVel = 0, ptrTarget = 0;
let ptrRAF = null, ptrLast = null;

function animPointer(now) {
    if (!ptrLast) ptrLast = now;
    const dt = Math.min(now - ptrLast, 50) / 1000;
    ptrLast = now;
    const err = ptrTarget - ptrAngle;
    ptrVel += (20 * err - 7 * ptrVel) * dt;
    ptrAngle += ptrVel * dt;
    ptrEl.style.transform = `translateX(-50%) rotate(${ptrAngle.toFixed(2)}deg)`;
    if (Math.abs(err) > 0.05 || Math.abs(ptrVel) > 0.05) {
        ptrRAF = requestAnimationFrame(animPointer);
    } else {
        ptrAngle = ptrTarget; ptrVel = 0;
        ptrEl.style.transform = `translateX(-50%) rotate(${ptrAngle}deg)`;
        ptrRAF = null; ptrLast = null;
    }
}
function setPointerLean(deg) {
    ptrTarget = Math.max(-30, Math.min(30, deg));
    if (!ptrRAF) { ptrLast = null; ptrRAF = requestAnimationFrame(animPointer); }
}

function getWeightedRandom() {
    const avail = sectors.map((s,i) => ({...s, idx:i})).filter(s => !s.isSB);
    const total = avail.reduce((sum, s) => sum + s.weight, 0);
    let r = Math.random() * total;
    for (const s of avail) { r -= s.weight; if (r <= 0) return s.idx; }
    return avail[0].idx;
}

function loadBalance() {
    const urlBal = parseInt(new URLSearchParams(location.search).get('balance'));
    if (tg.CloudStorage) {
        tg.CloudStorage.getItem(`balance_${userId}`, (err, val) => {
            const saved = (!err && val) ? parseInt(val) : NaN;
            if (!isNaN(saved) && saved >= 0) {
                stars = (!isNaN(urlBal) && urlBal > saved) ? urlBal : saved;
            } else {
                stars = (!isNaN(urlBal) && urlBal >= 0) ? urlBal : 0;
            }
            if (!isNaN(urlBal) && urlBal > (isNaN(saved) ? -1 : saved)) saveBalance();
            update();
        });
    } else {
        stars = (!isNaN(urlBal) && urlBal >= 0) ? urlBal : 0;
        update();
    }
}

function saveBalance(cb) {
    if (tg.CloudStorage) {
        tg.CloudStorage.setItem(`balance_${userId}`, String(stars), err => {
            if (!err) console.log('saved:', stars);
            if (cb) cb();
        });
    } else if (cb) cb();
}

function update() {
    document.getElementById('s_bal').innerText   = stars;
    document.getElementById('cur_bet').innerText = curBet;
    const btn = document.getElementById('spinBtn');
    if (hasFreeSpins > 0) {
        btn.innerText = `🎁 FREE SPIN (${hasFreeSpins})`;
        btn.classList.remove('dep-mode'); btn.classList.add('free-mode');
    } else if (stars < curBet) {
        btn.innerText = 'ПОПОЛНИТЬ';
        btn.classList.add('dep-mode'); btn.classList.remove('free-mode');
    } else {
        btn.innerText = 'КРУТИТЬ';
        btn.classList.remove('dep-mode', 'free-mode');
    }
    document.getElementById('btn-minus').disabled = isSpinning;
    document.getElementById('btn-plus').disabled  = isSpinning;
}

const histArr = [];
function addHistory(label, cls) {
    histArr.unshift({ label, cls });
    if (histArr.length > 12) histArr.pop();
    const bar = document.getElementById('history-bar');
    bar.innerHTML = '';
    histArr.forEach(item => {
        const c = document.createElement('div');
        c.className = `h-chip ${item.cls}`;
        c.textContent = item.label;
        bar.appendChild(c);
    });
}

function angleForSector(idx) {
    return -Math.PI / 2 - idx * ARC - ARC / 2;
}

function toggleFast() {
    playClick();
    fastMode = !fastMode;
    document.getElementById('fast-btn').classList.toggle('active', fastMode);
}

function handleSpin() {
    if (isSpinning) return;
    if (hasFreeSpins === 0 && stars < curBet) { openM(); return; }
    if (hlRAF) { cancelAnimationFrame(hlRAF); hlRAF = null; hlIdx = -1; }
    resumeAudio().then(() => { startBgMusic(); doSpin(); });
}

function doSpin() {
    playClick();
    charSpin(); // ← персонаж смотрит на рулетку
    isSpinning = true;
    update();

    let isFree = false;
    if (hasFreeSpins > 0) { hasFreeSpins--; isFree = true; }
    else                   { stars -= curBet; }
    saveBalance();

    const finalIdx = getWeightedRandom();

    let finalAngle = angleForSector(finalIdx);
    while (finalAngle < curAngle + Math.PI * 2 * 6) finalAngle += Math.PI * 2;
    finalAngle += Math.floor(Math.random() * 3) * Math.PI * 2;

    const totalRot = finalAngle - curAngle;
    const startAng = curAngle;
    const dur = fastMode ? 800 : 4000 + Math.random() * 1500;

    function eased(p) {
        return p < 0.5 ? 16 * p * p * p * p * p : 1 - Math.pow(-2 * p + 2, 5) / 2;
    }

    let t0 = null, lastSpd = 45, prevE = 0;
    startRatchet(fastMode ? 15 : 45);

    function frame(now) {
        if (!t0) t0 = now;
        const p  = Math.min((now - t0) / dur, 1);
        const e  = eased(p);
        const de = e - prevE; prevE = e;

        curAngle = startAng + totalRot * e;
        draw(curAngle, -1, 0);

        const radVel = totalRot * de / 0.016;
        const lean   = Math.min(30, Math.abs(radVel) * 0.09);
        setPointerLean(radVel > 0 ? -lean : lean);

        const spd = p > 0.88 ? 220 : p > 0.68 ? 110 : 45;
        if (!fastMode && spd !== lastSpd) { lastSpd = spd; startRatchet(spd); }

        if (p < 1) { requestAnimationFrame(frame); return; }

        stopRatchet();
        setPointerLean(0);
        isSpinning = false;
        curAngle   = finalAngle;
        update();

        const win = sectors[finalIdx];
        let winAmount = 0;

        if (win.isFree) {
            hasFreeSpins++;
            playFree();
            charFree(); // ← персонаж радуется фриспину
            if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
            addHistory('🎁 FREE', 'h-free');
        } else if (win.mult > 0) {
            winAmount = curBet * win.mult;
            stars    += winAmount;
            playWin();
            charWin(); // ← персонаж радуется
            if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
            addHistory(isFree ? `🎁+${winAmount}⭐` : `${win.t} +${winAmount}⭐`, 'h-win');
        } else {
            playLose();
            charLose(); // ← персонаж грустит
            if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('error');
            addHistory(isFree ? '🎁💀' : `-${curBet}⭐`, 'h-lose');
        }

        startHighlight(finalIdx);
        saveBalance();
        update();
    }
    requestAnimationFrame(frame);
}

function openM()  { playClick(); document.getElementById('modal').classList.add('open'); }
function closeM() { playClick(); document.getElementById('modal').classList.remove('open'); }
function setTab(t, el) {
    playClick();
    document.querySelectorAll('.tab,.tab-content').forEach(e => e.classList.remove('active'));
    document.getElementById(t).classList.add('active');
    el.classList.add('active');
}

function doDep() {
    playClick();
    const val = parseInt(document.getElementById('dep_val').value);
    if (!val || isNaN(val) || val < MIN_DEPOSIT) { alert(`Минимум ${MIN_DEPOSIT} звезд`); return; }
    tg.sendData(JSON.stringify({ action: 'deposit', amount: val, userId: userId }));
}

function calcWit() {
    const v = parseInt(document.getElementById('w_stars').value) || 0;
    document.getElementById('wit_preview').textContent =
        v > 0 ? `Вы получите: ${(v * tonPerStar).toFixed(4)} TON` : 'Вы получите: — TON';
}

function doWit() {
    playClick();
    const val  = parseInt(document.getElementById('w_stars').value);
    const addr = document.getElementById('w_addr').value.trim();
    const memo = document.getElementById('w_memo').value.trim();
    if (!addr)                           { alert('Введите адрес TON'); return; }
    if (!val || isNaN(val) || val <= 0)  { alert('Введите сумму'); return; }
    if (val < MIN_WITHDRAW)              { alert(`Минимум ${MIN_WITHDRAW} звезд`); return; }
    if (val > stars)                     { alert(`Недостаточно звезд (у вас ${stars})`); return; }
    const ton = (val * tonPerStar).toFixed(4);
    const rateText = `1 zvezda = ${tonPerStar.toFixed(6)} TON`;
    stars -= val; saveBalance(); update();
    tg.sendData(JSON.stringify({
        action: 'withdraw', stars: val, ton: ton, rate: rateText,
        address: addr, memo: memo || '-', balanceAfter: stars, userId: userId
    }));
}

function adjBet(v) {
    if (isSpinning) return;
    playClick();
    curBet = Math.max(5, curBet + v);
    update();
}

window.addEventListener('beforeunload', () => saveBalance());
window.addEventListener('DOMContentLoaded', () => {
    loadBalance();
    draw(0, -1, 0);
});
