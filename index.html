<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Magik Spin</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        html, body {
            height: 100%; margin: 0; padding: 0; overflow: hidden;
            background: #050505; color: white;
            font-family: 'Segoe UI', sans-serif;
        }
        body {
            display: flex; flex-direction: column;
            align-items: center; justify-content: space-between;
            padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom) 0;
        }
        #particles {
            position: fixed; inset: 0; z-index: 0;
            pointer-events: none; overflow: hidden;
        }
        .particle {
            position: absolute; bottom: -30px;
            animation: floatUp linear infinite;
            opacity: 0;
        }
        @keyframes floatUp {
            0%   { transform: translateY(0) scale(1);   opacity: 0; }
            10%  { opacity: 1; }
            90%  { opacity: 0.6; }
            100% { transform: translateY(-110vh) scale(0.5); opacity: 0; }
        }
        .top-bar {
            width: 100%; padding: 10px 0 4px;
            display: flex; justify-content: center; position: relative;
            flex-shrink: 0; z-index: 2;
        }
        .wallet-btn {
            position: fixed; right: 15px;
            top: calc(env(safe-area-inset-top) + 12px);
            z-index: 200;
            background: rgba(142,68,173,0.3); border: 1px solid #8e44ad;
            color: white; border-radius: 8px; padding: 6px 12px;
            font-size: 0.8em; cursor: pointer;
        }
        #bal-row {
            width: 90%; max-width: 310px;
            display: flex; align-items: center;
            justify-content: space-between;
            flex-shrink: 0; z-index: 2;
            margin-top: 4px;
        }
        #bal-block {
            display: flex; flex-direction: column; align-items: flex-start;
        }
        #bal-label {
            font-size: 0.62em; font-weight: 700; letter-spacing: 1.5px;
            color: rgba(255,215,0,0.7); text-transform: uppercase; line-height: 1;
            margin-bottom: 2px;
        }
        .bal-display {
            font-size: 1.5em; font-weight: bold; color: gold;
            text-shadow: 0 0 12px rgba(255,215,0,0.6);
            line-height: 1;
        }
        /* ПЕРСОНАЖ — увеличен */
        #char-canvas {
            width: 100px; height: 100px;
            flex-shrink: 0;
            filter: drop-shadow(0 0 8px rgba(142,68,173,0.6));
        }
        #sb-banner {
            position: fixed;
            top: calc(env(safe-area-inset-top) + 8px);
            left: 10px; z-index: 50;
            background: linear-gradient(135deg, #1a0f00, #2d1a00, #1a0f00);
            border: 1.5px solid #ffd700; border-radius: 10px;
            padding: 5px 12px 5px 8px;
            display: flex; align-items: center; gap: 6px;
            animation: sbPulse 2.2s ease-in-out infinite;
            pointer-events: none;
        }
        @keyframes sbPulse {
            0%,100% { box-shadow: 0 0 8px #ffd700, 0 0 20px #ffaa00, 0 0 35px rgba(255,136,0,.4); }
            50%      { box-shadow: 0 0 16px #ffd700, 0 0 36px #ffaa00, 0 0 65px rgba(255,136,0,.7); }
        }
        .sb-crown  { font-size: 20px; filter: drop-shadow(0 0 6px #ffd700); }
        .sb-text   { display: flex; flex-direction: column; line-height: 1.2; }
        .sb-label  { font-size: 8px; font-weight: 900; letter-spacing: 2px; color: #ffd700; text-transform: uppercase; }
        .sb-amount { font-size: 14px; font-weight: 900; color: #fff; text-shadow: 0 0 8px #ffd700; }
        .wheel-container {
            position: relative; width: 80vw; max-width: 310px;
            aspect-ratio: 1/1; flex-shrink: 0; z-index: 2;
        }
        canvas#canvas {
            width: 100%; height: 100%;
            filter: drop-shadow(0 0 15px #8e44ad); display: block;
        }
        #ptr {
            position: absolute; top: -10px; left: 50%;
            transform: translateX(-50%) rotate(0deg);
            transform-origin: 50% 100%;
            width: 0; height: 0;
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-top: 25px solid #f1c40f;
            z-index: 10;
            filter: drop-shadow(0 0 8px rgba(241,196,15,0.8));
        }
        #history-bar {
            width: 90%; max-width: 310px;
            display: flex; gap: 5px; overflow-x: auto;
            padding: 2px 0; scrollbar-width: none; flex-shrink: 0; z-index: 2;
        }
        #history-bar::-webkit-scrollbar { display: none; }
        .h-chip {
            flex-shrink: 0; border-radius: 20px; padding: 4px 10px;
            font-size: .72em; font-weight: bold; white-space: nowrap;
            opacity: 0; transform: scale(.5); animation: chipIn .3s forwards;
        }
        @keyframes chipIn { to { opacity: 1; transform: scale(1); } }
        .h-win  { background: rgba(39,174,96,.22);  border: 1px solid #27ae60; color: #2ecc71; }
        .h-lose { background: rgba(231,76,60,.22);   border: 1px solid #e74c3c; color: #e74c3c; }
        .h-free { background: rgba(52,152,219,.22);  border: 1px solid #3498db; color: #74b9ff; }
        .controls {
            width: 100%; text-align: center;
            padding-bottom: 18px; flex-shrink: 0; z-index: 2;
        }
        .bet-box {
            display: flex; align-items: center;
            justify-content: center; gap: 20px;
            margin-bottom: 15px;
        }
        #sound-btn {
            background: rgba(142,68,173,0.3); border: 1px solid #8e44ad;
            color: white; border-radius: 50%;
            width: 50px; height: 50px; font-size: 20px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
        }
        .btn-adj {
            background: #8e44ad; border: none; color: white;
            width: 50px; height: 50px; border-radius: 50%; font-size: 1.5em;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
        }
        .btn-adj:disabled { opacity: 0.4; cursor: not-allowed; }
        #fast-btn {
            background: rgba(142,68,173,0.3); border: 1px solid #8e44ad;
            color: white; border-radius: 50%;
            width: 50px; height: 50px; font-size: 22px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: all .2s;
        }
        #fast-btn.active {
            background: rgba(241,196,15,0.4); border-color: #f1c40f;
            box-shadow: 0 0 12px #f1c40f;
        }
        .spin-btn {
            width: 85%; padding: 18px; border-radius: 50px; border: none;
            color: white; font-weight: bold; font-size: 1.4em;
            background: #8e44ad; box-shadow: 0 0 25px #8e44ad;
            transition: all .3s; cursor: pointer;
        }
        .dep-mode  { background: #e74c3c !important; box-shadow: 0 0 25px #e74c3c !important; }
        .free-mode { background: #27ae60 !important; box-shadow: 0 0 25px #27ae60 !important; }
        #modal {
            display: none; position: fixed; inset: 0;
            background: #000; z-index: 300;
            flex-direction: column; overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }
        #modal.open { display: flex; }
        .tabs { display: flex; background: #1a1a1a; flex-shrink: 0; }
        .tab { flex: 1; padding: 20px; text-align: center; font-weight: bold; cursor: pointer; }
        .tab.active { border-bottom: 3px solid #8e44ad; color: #8e44ad; }
        .tab-content {
            display: none; padding: 28px 20px 80px;
            flex-direction: column; align-items: center; width: 100%;
        }
        .tab-content.active { display: flex; }
        .modal-input {
            width: 100%; padding: 15px; margin: 8px 0;
            border-radius: 12px; border: 1px solid #444;
            background: #111; color: white; font-size: 1.05em;
        }
        .modal-input:focus { outline: none; border-color: #8e44ad; }
        .m-hint    { color: #666; font-size: .8em; text-align: center; margin: 2px 0 8px; line-height: 1.5; }
        .m-warn    { color: #e74c3c; font-size: .85em; text-align: center; margin: 6px 0; }
        .m-preview { color: #0af; font-size: 1.1em; font-weight: bold; margin: 10px 0 2px; }
        .m-rate    { color: #777; font-size: .78em; text-align: center; margin-bottom: 6px; }
        .modal-btn {
            width: 100%; padding: 18px; border-radius: 50px; border: none;
            color: white; font-weight: bold; font-size: 1.2em;
            background: #8e44ad; box-shadow: 0 0 20px #8e44ad;
            margin-top: 14px; cursor: pointer;
        }
        .modal-btn.green { background: #27ae60; box-shadow: 0 0 20px #27ae60; }
        .back-link { margin-top: 24px; color: #777; font-size: .9em; cursor: pointer; }
    </style>
</head>
<body>

<div id="particles"></div>

<div id="sb-banner">
    <span class="sb-crown">👑</span>
    <div class="sb-text">
        <span class="sb-label">SuperBonus</span>
        <span class="sb-amount">500 TON</span>
    </div>
</div>

<button class="wallet-btn" onclick="openM()">Кошелек</button>

<div class="top-bar"></div>

<div class="wheel-container">
    <div id="ptr"></div>
    <canvas id="canvas" width="600" height="600"></canvas>
</div>

<div id="bal-row">
    <div id="bal-block">
        <span id="bal-label">БАЛАНС</span>
        <div class="bal-display">⭐ <span id="s_bal">0</span></div>
    </div>
    <canvas id="char-canvas" width="200" height="200"></canvas>
</div>

<div id="history-bar"></div>

<div class="controls">
    <div class="bet-box">
        <button id="sound-btn" onclick="toggleSound()">🔊</button>
        <button class="btn-adj" id="btn-minus" onclick="adjBet(-20)">-</button>
        <div>Ставка<br><b id="cur_bet">5</b> ⭐</div>
        <button class="btn-adj" id="btn-plus" onclick="adjBet(20)">+</button>
        <button id="fast-btn" onclick="toggleFast()">🐇</button>
    </div>
    <button id="spinBtn" class="spin-btn" onclick="handleSpin()">КРУТИТЬ</button>
</div>

<div id="modal">
    <div class="tabs">
        <div class="tab active" id="tab-dep" onclick="setTab('dep',this)">ПОПОЛНИТЬ</div>
        <div class="tab"        id="tab-wit" onclick="setTab('wit',this)">ВЫВОД</div>
    </div>
    <div id="dep" class="tab-content active">
        <h2 style="color:gold; margin-bottom:4px;">Пополнение ⭐</h2>
        <p class="m-warn">Минимум 10 ⭐</p>
        <input class="modal-input" type="number" id="dep_val"
               placeholder="Введите количество звёзд" min="10" inputmode="numeric">
        <p class="m-hint">Введите количество звёзд для пополнения баланса</p>
        <button class="modal-btn green" onclick="doDep()">КУПИТЬ ⭐</button>
        <p class="back-link" onclick="closeM()">← Назад</p>
    </div>
    <div id="wit" class="tab-content">
        <h2 style="color:#0088cc; margin-bottom:4px;">Вывод TON</h2>
        <p class="m-warn">Минимум 500 ⭐</p>
        <input class="modal-input" type="number" id="w_stars"
               placeholder="Сумма звёзд (мин. 500)" inputmode="numeric" oninput="calcWit()">
        <div class="m-preview" id="wit_preview">Вы получите: — TON</div>
        <p class="m-rate" id="rate-label">Курс: загрузка…</p>
        <input class="modal-input" type="text" id="w_addr" placeholder="Адрес TON (UQ...)">
        <input class="modal-input" type="text" id="w_memo" placeholder="MEMO / Tag">
        <p class="m-hint" style="font-size:.75em;">MEMO — если требуется биржей или кошельком</p>
        <button class="modal-btn" onclick="doWit()">ВЫВЕСТИ</button>
        <p class="back-link" onclick="closeM()">← Назад</p>
    </div>
</div>

<script>
const tg = window.Telegram.WebApp;
tg.expand();

let stars        = 0;
let curBet       = 5;
let isSpinning   = false;
let hasFreeSpins = 0;
let fastMode     = false;
let userId       = new URLSearchParams(location.search).get('uid') || 'unknown';

const MIN_WITHDRAW = 500;
const MIN_DEPOSIT  = 10;
let tonPerStar = 0.013333;

(async function fetchTonRate() {
    try {
        const res = await fetch(
            'https://api.coingecko.com/api/v3/simple/price?ids=the-open-network&vs_currencies=usd',
            { cache: 'no-cache' }
        );
        if (res.ok) {
            const json   = await res.json();
            const tonUsd = json['the-open-network']?.usd;
            if (tonUsd && tonUsd > 0) {
                tonPerStar = 0.013 / tonUsd;
                document.getElementById('rate-label').textContent =
                    `Курс: 1 ⭐ = ${tonPerStar.toFixed(5)} TON  (1 TON = $${tonUsd.toFixed(2)})`;
                calcWit(); return;
            }
        }
    } catch (_) {}
    document.getElementById('rate-label').textContent = `Курс: 1 ⭐ = ${tonPerStar.toFixed(5)} TON`;
})();

/* ── ЧАСТИЦЫ ── */
(function spawnParticles() {
    const container = document.getElementById('particles');
    const items = ['⭐','💫','✨','🌟','⭐','💎','⭐','✨'];
    function spawn() {
        const el = document.createElement('div');
        el.className = 'particle';
        el.textContent = items[Math.floor(Math.random() * items.length)];
        const size = 10 + Math.random() * 18;
        const dur  = 6 + Math.random() * 10;
        const delay = Math.random() * 8;
        el.style.cssText = `left:${Math.random()*100}%;font-size:${size}px;animation-duration:${dur}s;animation-delay:${delay}s;filter:blur(${Math.random()<0.4?1:0}px) drop-shadow(0 0 4px gold);`;
        container.appendChild(el);
        setTimeout(() => el.remove(), (dur + delay) * 1000);
    }
    for (let i = 0; i < 18; i++) spawn();
    setInterval(spawn, 1200);
})();

/* ══════════════════════════════════════════════════════
   КОРОЛЬ — canvas 200×200
   Состояния: idle | anticipation | watching | win | lose
══════════════════════════════════════════════════════ */
const cc   = document.getElementById('char-canvas');
const cctx = cc.getContext('2d');

const CW = 200, CH = 200;

// ── State ──
let charMood       = 'idle';
let charStateTimer = null;
let moodT          = 0;       // время в текущем состоянии (сек)

// ── Дыхание / покачивание (не зависит от fastMode) ──
let breathT   = 0;
let weightT   = 0;   // перенос веса (watching)

// ── Моргание ──
let blinkOpen  = 1.0;   // 1=открыт, 0=закрыт
let blinkPhase = 'wait';// wait | closing | opening
let blinkWait  = 3.5 + Math.random() * 2.5;  // медленное моргание

// ── Взгляд ──
let eyeX = 0, eyeY = 0;          // текущее смещение зрачка
let eyeTargX = 0, eyeTargY = 0;
let eyeChangeT = 2 + Math.random() * 3;

// ── Меч ──
let swordAngle    = 0;   // 0=опущен, 1=поднят
let swordAngleCur = 0;   // плавное

// ── Голова (наклон) ──
let headTiltCur = 0;     // -1=влево (к рулетке), 0=прямо
let headTiltTrg = 0;

// ── Плечи (опускание при проигрыше) ──
let shoulderDrop = 0;    // 0=норм, 1=опущены

// ── Win-эффекты ──
let winParticles = [];
let swordGlow    = 0;

// ── Темное облако (lose) ──
let cloudAlpha = 0;

// ── Переход / анимированная фаза ──
let transitionT = 0;

function setCharMood(mood, dur) {
    charMood = mood;
    moodT    = 0;
    transitionT = 0;
    if (charStateTimer) clearTimeout(charStateTimer);
    if (dur) charStateTimer = setTimeout(() => { setCharMood('idle'); }, dur);
}

// ─────────────────────────────────────────
// Вспомогательные функции рисования
// ─────────────────────────────────────────

function lerp(a, b, t) { return a + (b - a) * t; }
function clamp(v, mn, mx) { return Math.max(mn, Math.min(mx, v)); }
function easeOut(t) { return 1 - Math.pow(1 - t, 3); }

function drawCrown(x, y, scale) {
    cctx.save();
    cctx.translate(x, y);
    cctx.scale(scale, scale);
    // Основа
    cctx.beginPath();
    cctx.rect(-22, 0, 44, 14);
    cctx.fillStyle = '#ffd700';
    cctx.fill();
    // Зубцы
    const teeth = [[-22,0],[-14,-18],[-6,0],[0,-22],[6,0],[14,-18],[22,0]];
    cctx.beginPath();
    cctx.moveTo(-22, 0);
    for (let i = 0; i < teeth.length; i++) cctx.lineTo(teeth[i][0], teeth[i][1]);
    cctx.lineTo(22, 0);
    cctx.fillStyle = '#ffd700'; cctx.fill();
    cctx.strokeStyle = '#b8860b'; cctx.lineWidth = 1.5; cctx.stroke();
    // Камни
    [[0,-8],[−10,4],[10,4]].forEach(([rx,ry]) => {
        cctx.beginPath(); cctx.arc(rx, ry, 3.5, 0, Math.PI*2);
        cctx.fillStyle = rx===0?'#e74c3c':'#3498db'; cctx.fill();
    });
    // Блеск
    cctx.beginPath(); cctx.arc(0,-14,2.5,0,Math.PI*2);
    cctx.fillStyle='rgba(255,255,255,0.7)'; cctx.fill();
    cctx.restore();
}

function drawFace(cx, cy, headR, mood, blinkVal, ex, ey) {
    // Голова
    const skinG = cctx.createRadialGradient(cx-5,cy-6,3,cx,cy,headR);
    skinG.addColorStop(0,'#ffe0b2');
    skinG.addColorStop(1,'#d4916a');
    cctx.beginPath(); cctx.arc(cx,cy,headR,0,Math.PI*2);
    cctx.fillStyle = skinG; cctx.fill();
    cctx.strokeStyle='rgba(0,0,0,0.12)'; cctx.lineWidth=1.5; cctx.stroke();

    // Борода
    cctx.beginPath();
    cctx.moveTo(cx-headR*0.7, cy+headR*0.3);
    cctx.quadraticCurveTo(cx-headR*0.85, cy+headR*1.1, cx-headR*0.2, cy+headR*1.2);
    cctx.quadraticCurveTo(cx, cy+headR*1.35, cx+headR*0.2, cy+headR*1.2);
    cctx.quadraticCurveTo(cx+headR*0.85, cy+headR*1.1, cx+headR*0.7, cy+headR*0.3);
    cctx.fillStyle='#8B6914'; cctx.fill();
    // Полосы бороды
    for(let i=-1;i<=1;i++) {
        cctx.beginPath();
        cctx.moveTo(cx+i*7, cy+headR*0.6);
        cctx.quadraticCurveTo(cx+i*9, cy+headR*1.0, cx+i*6, cy+headR*1.25);
        cctx.strokeStyle='rgba(0,0,0,0.12)'; cctx.lineWidth=1.2; cctx.stroke();
    }

    // Усы
    cctx.beginPath();
    cctx.moveTo(cx-15, cy+headR*0.18);
    cctx.quadraticCurveTo(cx-8, cy+headR*0.3, cx, cy+headR*0.22);
    cctx.quadraticCurveTo(cx+8, cy+headR*0.3, cx+15, cy+headR*0.18);
    cctx.fillStyle='#6b4f12'; cctx.fill();

    // Глаза
    const eyePositions = [[cx-11, cy-5],[cx+11, cy-5]];
    eyePositions.forEach(([ex0,ey0]) => {
        // Белок
        const eyeHalf = 5.5 * blinkVal;
        cctx.beginPath();
        cctx.ellipse(ex0, ey0, 6, Math.max(0.5, eyeHalf), 0, 0, Math.PI*2);
        cctx.fillStyle='white'; cctx.fill();
        // Зрачок
        if (blinkVal > 0.25) {
            cctx.beginPath();
            cctx.arc(ex0+ex*3.5, ey0+ey*2, 3, 0, Math.PI*2);
            cctx.fillStyle='#1a0a2e'; cctx.fill();
            // Блик
            cctx.beginPath();
            cctx.arc(ex0+ex*3.5+1, ey0+ey*2-1, 1.1, 0, Math.PI*2);
            cctx.fillStyle='rgba(255,255,255,0.85)'; cctx.fill();
        }
    });

    // Брови
    cctx.lineWidth=2.8; cctx.lineCap='round';
    if (mood==='win') {
        // Высоко и радостно
        [[-11,-20],[11,-20]].forEach(([bx,by],i) => {
            cctx.beginPath();
            cctx.moveTo(cx+bx-8+i*2, cy+by-3);
            cctx.quadraticCurveTo(cx+bx, cy+by-7, cx+bx+7-i*2, cy+by-3);
            cctx.strokeStyle='#5c3a0a'; cctx.stroke();
        });
    } else if (mood==='lose') {
        // Грустно — внутренние углы вниз
        [[-11,-18],[11,-18]].forEach(([bx,by],i) => {
            const sign = i===0?1:-1;
            cctx.beginPath();
            cctx.moveTo(cx+bx-8, cy+by);
            cctx.quadraticCurveTo(cx+bx+sign*3, cy+by+5, cx+bx+8, cy+by);
            cctx.strokeStyle='#5c3a0a'; cctx.stroke();
        });
    } else {
        // Нейтральные / внимательные
        [[-11,-18],[11,-18]].forEach(([bx,by]) => {
            cctx.beginPath();
            cctx.moveTo(cx+bx-7, cy+by+(mood==='watching'?-2:0));
            cctx.quadraticCurveTo(cx+bx, cy+by-3+(mood==='watching'?-2:0), cx+bx+7, cy+by+(mood==='watching'?-2:0));
            cctx.strokeStyle='#5c3a0a'; cctx.stroke();
        });
    }

    // Рот
    const mY = cy + headR*0.1;
    cctx.beginPath(); cctx.lineWidth=2.5; cctx.lineCap='round';
    if (mood==='win') {
        cctx.moveTo(cx-13, mY-1);
        cctx.quadraticCurveTo(cx, mY+12, cx+13, mY-1);
        cctx.strokeStyle='#5c3a0a'; cctx.stroke();
        cctx.beginPath();
        cctx.ellipse(cx, mY+4, 8, 4.5, 0, 0, Math.PI);
        cctx.fillStyle='white'; cctx.fill();
        // Румянец
        [[cx-16,mY],[cx+16,mY]].forEach(([rx,ry])=>{
            cctx.beginPath();
            cctx.ellipse(rx,ry,7,4,0,0,Math.PI*2);
            cctx.fillStyle='rgba(255,100,80,0.28)'; cctx.fill();
        });
    } else if (mood==='lose') {
        cctx.moveTo(cx-11, mY+5);
        cctx.quadraticCurveTo(cx, mY-3, cx+11, mY+5);
        cctx.strokeStyle='#5c3a0a'; cctx.stroke();
        // Слеза
        cctx.beginPath();
        cctx.moveTo(cx+12, cy-1);
        cctx.bezierCurveTo(cx+15,cy+5, cx+14,cy+11, cx+11,cy+13);
        cctx.bezierCurveTo(cx+8,cy+11, cx+9,cy+5, cx+12,cy-1);
        cctx.fillStyle='rgba(100,180,255,0.8)'; cctx.fill();
    } else if (mood==='watching'||mood==='anticipation') {
        // Приоткрытый рот
        cctx.moveTo(cx-8, mY+1);
        cctx.quadraticCurveTo(cx, mY+6, cx+8, mY+1);
        cctx.strokeStyle='#5c3a0a'; cctx.stroke();
    } else {
        // Нейтральная лёгкая улыбка
        cctx.moveTo(cx-9, mY+1);
        cctx.quadraticCurveTo(cx, mY+6, cx+9, mY+1);
        cctx.strokeStyle='#5c3a0a'; cctx.stroke();
    }
}

function drawKing(now) {
    cctx.clearRect(0, 0, CW, CH);

    const isWin  = charMood==='win';
    const isLose = charMood==='lose';
    const isWatch= charMood==='watching'||charMood==='anticipation';

    // ── Якоря персонажа ──
    const baseX = CW/2;
    // Дыхание — фиксированная скорость, НЕ зависит от fastMode
    breathT += 0.016;
    const breathY = Math.sin(breathT * 0.9) * 2.2;

    // Перенос веса при watching
    if (isWatch) weightT += 0.016;
    else         weightT *= 0.92;
    const sway = Math.sin(weightT * 1.1) * (isWatch ? 2.5 : 0);

    const baseY = CH - 18 + breathY;
    const bodyH = 54;
    const bodyW = 32;
    const neckY = baseY - bodyH;
    const headR = 22;
    const headCY = neckY - headR - 4;

    // ── Наклон головы ──
    const headTilt = headTiltCur * 0.22; // радианы

    // ── Мантия / тело ──
    // Тень
    cctx.beginPath();
    cctx.ellipse(baseX+sway, baseY+4, bodyW*0.85, 7, 0, 0, Math.PI*2);
    cctx.fillStyle='rgba(0,0,0,0.25)'; cctx.fill();

    // Мантия (красная)
    const mantleFlap = Math.sin(breathT*0.7)*3;
    cctx.beginPath();
    cctx.moveTo(baseX+sway-bodyW-10, neckY+10);
    cctx.quadraticCurveTo(baseX+sway-bodyW-18, baseY-10, baseX+sway-bodyW-8+mantleFlap, baseY+2);
    cctx.lineTo(baseX+sway+bodyW+8-mantleFlap, baseY+2);
    cctx.quadraticCurveTo(baseX+sway+bodyW+18, baseY-10, baseX+sway+bodyW+10, neckY+10);
    cctx.closePath();
    const mantleG = cctx.createLinearGradient(baseX-bodyW-18, neckY, baseX+bodyW+18, neckY);
    mantleG.addColorStop(0,'#8b0000');
    mantleG.addColorStop(0.5,'#c0392b');
    mantleG.addColorStop(1,'#8b0000');
    cctx.fillStyle=mantleG; cctx.fill();
    // Меховая оторочка мантии
    cctx.beginPath();
    cctx.moveTo(baseX+sway-bodyW-12, neckY+8);
    cctx.quadraticCurveTo(baseX+sway-bodyW-20, baseY-12, baseX+sway-bodyW-10+mantleFlap, baseY);
    cctx.strokeStyle='rgba(255,255,255,0.55)'; cctx.lineWidth=5; cctx.stroke();
    cctx.beginPath();
    cctx.moveTo(baseX+sway+bodyW+12, neckY+8);
    cctx.quadraticCurveTo(baseX+sway+bodyW+20, baseY-12, baseX+sway+bodyW+10-mantleFlap, baseY);
    cctx.stroke();

    // Туловище (камзол)
    const bodyG = cctx.createLinearGradient(baseX+sway-bodyW, neckY, baseX+sway+bodyW, baseY);
    bodyG.addColorStop(0,'#4a148c');
    bodyG.addColorStop(0.5,'#7b1fa2');
    bodyG.addColorStop(1,'#4a148c');
    cctx.beginPath();
    cctx.moveTo(baseX+sway-bodyW+4, neckY+6);
    cctx.bezierCurveTo(baseX+sway-bodyW-2,neckY+20, baseX+sway-bodyW+2,baseY-10, baseX+sway-bodyW+8,baseY);
    cctx.lineTo(baseX+sway+bodyW-8, baseY);
    cctx.bezierCurveTo(baseX+sway+bodyW-2,baseY-10, baseX+sway+bodyW+2,neckY+20, baseX+sway+bodyW-4,neckY+6);
    cctx.closePath();
    cctx.fillStyle=bodyG; cctx.fill();

    // Пояс
    cctx.beginPath();
    cctx.rect(baseX+sway-bodyW+5, neckY+bodyH*0.55, (bodyW-5)*2, 7);
    cctx.fillStyle='#ffd700'; cctx.fill();
    cctx.beginPath(); cctx.arc(baseX+sway, neckY+bodyH*0.55+3.5, 5, 0, Math.PI*2);
    cctx.fillStyle='#f39c12'; cctx.fill();

    // ── Ноги ──
    const legSway = Math.sin(weightT*1.1)*4;
    [[baseX+sway-12, baseY],[baseX+sway+12, baseY]].forEach(([lx,ly],i) => {
        const ls = i===0 ? legSway : -legSway;
        // Штанина
        cctx.beginPath();
        cctx.roundRect(lx-7+ls*0.5, ly-2, 14, 20, 3);
        cctx.fillStyle='#2c1654'; cctx.fill();
        // Сапог
        cctx.beginPath();
        cctx.roundRect(lx-8+ls*0.5, ly+16, 16, 10, [0,0,4,4]);
        cctx.fillStyle='#3d1a00'; cctx.fill();
        cctx.beginPath();
        cctx.ellipse(lx+ls*0.5, ly+26, 9, 4, 0, 0, Math.PI*2);
        cctx.fillStyle='#5c2800'; cctx.fill();
    });

    // ── Руки ──
    // Левая рука (обычная)
    const lArmDrop = isLose ? 8 : 0;
    cctx.beginPath();
    cctx.moveTo(baseX+sway-bodyW+4, neckY+14);
    cctx.quadraticCurveTo(baseX+sway-bodyW-18, neckY+30+lArmDrop, baseX+sway-bodyW-14, neckY+52+lArmDrop);
    cctx.strokeStyle='#4a148c'; cctx.lineWidth=11; cctx.lineCap='round'; cctx.stroke();
    cctx.strokeStyle='#6a1fa2'; cctx.lineWidth=8; cctx.stroke();

    // Правая рука + меч
    // swordAngleCur: 0=меч вниз, 1=вверх над головой
    const rArmX = baseX+sway+bodyW-4;
    const rArmY = neckY+14;
    const sA    = swordAngleCur;

    // Рука
    const rElbowX = rArmX + lerp(20, 18, sA);
    const rElbowY = rArmY + lerp(24, -8, sA);
    const rHandX  = rArmX + lerp(16, 8, sA);
    const rHandY  = rArmY + lerp(52, -30, sA);

    cctx.beginPath();
    cctx.moveTo(rArmX, rArmY);
    cctx.quadraticCurveTo(rElbowX, rElbowY, rHandX, rHandY);
    cctx.strokeStyle='#4a148c'; cctx.lineWidth=11; cctx.lineCap='round'; cctx.stroke();
    cctx.strokeStyle='#6a1fa2'; cctx.lineWidth=8; cctx.stroke();

    // Меч
    cctx.save();
    cctx.translate(rHandX, rHandY);
    // Угол меча в зависимости от состояния
    const swordRot = lerp(1.1, -0.3, sA);
    cctx.rotate(swordRot);

    // Свечение меча при победе
    if (isWin && swordGlow > 0) {
        cctx.shadowColor = '#ffd700';
        cctx.shadowBlur  = 18 * swordGlow;
    }

    // Рукоять (крестовина)
    cctx.beginPath();
    cctx.rect(-9, -3, 18, 6);
    cctx.fillStyle='#b8860b'; cctx.fill();
    // Рукоять-хват
    cctx.beginPath();
    cctx.roundRect(-4, 3, 8, 22, 2);
    cctx.fillStyle='#8B6914'; cctx.fill();
    cctx.beginPath(); cctx.arc(0, 26, 5, 0, Math.PI*2);
    cctx.fillStyle='#b8860b'; cctx.fill();
    // Клинок
    const bladeG = cctx.createLinearGradient(-3,-3,-3,-50);
    bladeG.addColorStop(0, isWin?'#fffde7':'#dce8f0');
    bladeG.addColorStop(0.5, isWin?'#ffd700':'#b0c8d8');
    bladeG.addColorStop(1, isWin?'#ffc107':'#8aabb8');
    cctx.beginPath();
    cctx.moveTo(-3, -3);
    cctx.lineTo(3, -3);
    cctx.lineTo(1, -54);
    cctx.lineTo(-1, -54);
    cctx.closePath();
    cctx.fillStyle=bladeG; cctx.fill();
    cctx.shadowBlur=0;
    cctx.restore();

    // ── Шея ──
    cctx.beginPath();
    cctx.roundRect(baseX+sway-8, headCY+headR-4, 16, 14, 3);
    cctx.fillStyle='#d4916a'; cctx.fill();

    // ── Голова (с наклоном) ──
    cctx.save();
    cctx.translate(baseX+sway, headCY);
    cctx.rotate(headTilt);

    // Воротник
    cctx.beginPath();
    cctx.moveTo(-headR-6, headR-2);
    cctx.quadraticCurveTo(0, headR+12, headR+6, headR-2);
    cctx.fillStyle='white'; cctx.fill();
    cctx.strokeStyle='rgba(0,0,0,0.1)'; cctx.lineWidth=1; cctx.stroke();

    drawFace(0, 0, headR, charMood, blinkOpen, eyeX, eyeY);
    drawCrown(0, -headR+2, 0.95);
    cctx.restore();

    // ── Тёмное облако (lose) ──
    if (cloudAlpha > 0) {
        cctx.save();
        cctx.globalAlpha = cloudAlpha * 0.7;
        const cx2 = baseX+sway, cy2 = headCY - headR - 28;
        [[0,-8],[12,0],[-12,0],[6,-18],[-6,-18]].forEach(([ox,oy])=>{
            cctx.beginPath();
            cctx.arc(cx2+ox, cy2+oy, 13, 0, Math.PI*2);
            cctx.fillStyle='#37474f'; cctx.fill();
        });
        // Капли дождя
        for(let d=0;d<3;d++) {
            cctx.beginPath();
            cctx.moveTo(cx2-10+d*10, cy2+10);
            cctx.lineTo(cx2-12+d*10, cy2+20);
            cctx.strokeStyle='rgba(100,180,255,0.6)';
            cctx.lineWidth=1.5; cctx.stroke();
        }
        cctx.restore();
    }

    // ── Win-частицы ──
    winParticles.forEach(p => {
        cctx.save();
        cctx.globalAlpha = p.a;
        cctx.font = `${p.s}px serif`;
        cctx.fillText(p.t, p.x, p.y);
        cctx.restore();
    });
}

/* ── Обновление логики (НЕ зависит от fastMode) ── */
let lastCharTs = 0;
function updateChar(ts) {
    // Фиксированный dt — анимация персонажа всегда одинаковая
    const dt = 0.016;
    lastCharTs = ts;

    moodT += dt;

    // ── Моргание: медленное, реалистичное ──
    if (blinkPhase === 'wait') {
        blinkWait -= dt;
        if (blinkWait <= 0) { blinkPhase = 'closing'; }
    } else if (blinkPhase === 'closing') {
        blinkOpen = Math.max(0, blinkOpen - dt * 7);  // медленнее
        if (blinkOpen <= 0) { blinkPhase = 'hold'; blinkWait = 0.07; }
    } else if (blinkPhase === 'hold') {
        blinkWait -= dt;
        if (blinkWait <= 0) { blinkPhase = 'opening'; }
    } else if (blinkPhase === 'opening') {
        blinkOpen = Math.min(1, blinkOpen + dt * 8);
        if (blinkOpen >= 1) {
            blinkPhase = 'wait';
            blinkWait = 3.0 + Math.random() * 3.5; // 3–6.5 сек между морганиями
        }
    }

    // ── Взгляд ──
    eyeChangeT -= dt;
    if (eyeChangeT <= 0) {
        if (charMood === 'idle') {
            eyeTargX = (Math.random() * 2 - 1) * 0.8;
            eyeTargY = (Math.random() * 2 - 1) * 0.5;
        } else if (charMood === 'watching' || charMood === 'anticipation') {
            eyeTargX = -0.9; eyeTargY = -0.3; // на рулетку
        } else if (charMood === 'win') {
            eyeTargX = 0; eyeTargY = -0.4;
        } else if (charMood === 'lose') {
            eyeTargX = 0; eyeTargY = 0.6;
        }
        eyeChangeT = charMood==='idle' ? 2+Math.random()*3 : 0.3;
    }
    eyeX += (eyeTargX - eyeX) * dt * 3;
    eyeY += (eyeTargY - eyeY) * dt * 3;

    // ── Наклон головы ──
    if (charMood==='watching'||charMood==='anticipation') headTiltTrg = -0.18;
    else if (charMood==='lose') headTiltTrg = 0.12;
    else headTiltTrg = 0;
    headTiltCur += (headTiltTrg - headTiltCur) * dt * 2.5;

    // ── Меч ──
    let swordTarget = 0;
    if (charMood==='win') swordTarget = 1;
    else if (charMood==='lose') swordTarget = -0.15; // чуть ниже
    swordAngleCur += (swordTarget - swordAngleCur) * dt * (charMood==='win' ? 1.8 : 1.2);

    // ── Плечи при проигрыше ──
    shoulderDrop += ((charMood==='lose'?1:0) - shoulderDrop) * dt * 1.5;

    // ── Win-свечение меча ──
    swordGlow += ((charMood==='win'?1:0) - swordGlow) * dt * 2;

    // ── Тёмное облако ──
    cloudAlpha += ((charMood==='lose'?1:0) - cloudAlpha) * dt * 1.2;

    // ── Win-частицы ──
    if (charMood==='win') {
        winParticles = winParticles.filter(p=>p.a>0);
        winParticles.forEach(p=>{ p.y-=dt*35; p.x+=p.vx*dt; p.a-=dt*0.55; });
        if (Math.random()<0.2) {
            const items=['✨','⭐','💛','🌟'];
            winParticles.push({
                t:items[Math.floor(Math.random()*items.length)],
                x:30+Math.random()*140, y:80+Math.random()*40,
                vx:(Math.random()-0.5)*45,
                s:11+Math.random()*11, a:1
            });
        }
    } else winParticles=[];
}

function charLoop(ts) {
    updateChar(ts);
    drawKing(ts);
    requestAnimationFrame(charLoop);
}
requestAnimationFrame(charLoop);

let soundEnabled = true;
let bgLoopTimer  = null;
let bgGainNode   = null;
const actx       = new (window.AudioContext || window.webkitAudioContext)();

function resumeAudio() {
    return actx.state === 'suspended' ? actx.resume() : Promise.resolve();
}

function startBgMusic() {
    if (!soundEnabled || bgLoopTimer) return;
    bgGainNode = actx.createGain();
    bgGainNode.gain.value = 0.05;
    bgGainNode.connect(actx.destination);
    const melody = [
        [523.25,0.00,0.35],[659.25,0.45,0.35],[783.99,0.90,0.35],
        [1046.5,1.35,0.55],[783.99,2.00,0.25],[659.25,2.35,0.25],
        [523.25,2.70,0.35],[493.88,3.15,0.35],[392.00,3.60,0.35],
        [523.25,4.00,0.40],[659.25,4.50,0.35],[783.99,4.95,0.35],
        [880.00,5.40,0.55],[783.99,6.05,0.25],[659.25,6.40,0.25],[523.25,6.75,0.90]
    ];
    const bass = [[130.81,0],[130.81,1.35],[98,2.7],[130.81,4.0],[130.81,5.4]];
    const LOOP = 8.0;
    function schedule(t0) {
        if (!bgGainNode) return;
        melody.forEach(([f,t,d]) => {
            const o = actx.createOscillator(), g = actx.createGain();
            o.connect(g); g.connect(bgGainNode);
            o.type = 'triangle'; o.frequency.value = f;
            const s = t0 + t;
            g.gain.setValueAtTime(0, s);
            g.gain.linearRampToValueAtTime(0.6, s + 0.03);
            g.gain.exponentialRampToValueAtTime(0.001, s + d);
            o.start(s); o.stop(s + d + 0.05);
        });
        bass.forEach(([f,t]) => {
            const o = actx.createOscillator(), g = actx.createGain();
            o.connect(g); g.connect(bgGainNode);
            o.type = 'sine'; o.frequency.value = f;
            const s = t0 + t;
            g.gain.setValueAtTime(0, s);
            g.gain.linearRampToValueAtTime(0.4, s + 0.05);
            g.gain.exponentialRampToValueAtTime(0.001, s + 0.5);
            o.start(s); o.stop(s + 0.6);
        });
    }
    let t = actx.currentTime + 0.1;
    schedule(t);
    bgLoopTimer = setInterval(() => {
        if (!soundEnabled) { stopBgMusic(); return; }
        t += LOOP; schedule(t);
    }, (LOOP - 0.4) * 1000);
}

function stopBgMusic() {
    if (bgLoopTimer) { clearInterval(bgLoopTimer); bgLoopTimer = null; }
    if (bgGainNode)  { bgGainNode.gain.linearRampToValueAtTime(0, actx.currentTime + 0.3); bgGainNode = null; }
}

function toggleSound() {
    soundEnabled = !soundEnabled;
    document.getElementById('sound-btn').textContent = soundEnabled ? '🔊' : '🔇';
    if (soundEnabled) resumeAudio().then(startBgMusic);
    else stopBgMusic();
}

function playTone(freq, type, dur, vol) {
    if (!soundEnabled) return;
    const o = actx.createOscillator(), g = actx.createGain();
    o.connect(g); g.connect(actx.destination);
    o.type = type; o.frequency.value = freq;
    g.gain.setValueAtTime(vol, actx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, actx.currentTime + dur);
    o.start(); o.stop(actx.currentTime + dur);
}
function playWin()  { [523,659,783,1046].forEach((f,i)=>setTimeout(()=>playTone(f,'triangle',0.3,0.3),i*80)); }
function playLose() { [300,220,160].forEach((f,i)=>setTimeout(()=>playTone(f,'sawtooth',0.2,0.2),i*100)); }
function playFree() { [659,880,1108].forEach((f,i)=>setTimeout(()=>playTone(f,'sine',0.25,0.25),i*90)); }
function playClick() {
    if (!soundEnabled) return;
    playTone(800,'square',0.05,0.1);
    if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
}

let ratchetTimer = null;
function startRatchet(ms) {
    stopRatchet();
    ratchetTimer = setInterval(()=>{
        if (!soundEnabled||actx.state==='suspended') return;
        const o=actx.createOscillator(),g=actx.createGain();
        o.connect(g); g.connect(actx.destination);
        o.type='square'; o.frequency.value=900;
        g.gain.setValueAtTime(0.07,actx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001,actx.currentTime+0.04);
        o.start(); o.stop(actx.currentTime+0.04);
    },ms);
}
function stopRatchet(){ if(ratchetTimer){clearInterval(ratchetTimer);ratchetTimer=null;} }

const N   = sectors.length;
const ARC = (Math.PI * 2) / N;

const canvas = document.getElementById('canvas');
const ctx    = canvas.getContext('2d');
let curAngle = 0;

let hlIdx=-1,hlPhase=0,hlRemain=0,hlRAF=null;

function draw(angle,hi,phase){
    ctx.clearRect(0,0,600,600);
    sectors.forEach((s,i)=>{
        const a=i*ARC+angle;
        if(s.isSB){
            const gr=ctx.createRadialGradient(300,300,60,300,300,280);

            gr.addColorStop(0.7,'#cc8800');gr.addColorStop(1,'#7a4800');
            ctx.beginPath();ctx.fillStyle=gr;
            ctx.moveTo(300,300);ctx.arc(300,300,280,a,a+ARC);ctx.fill();
            ctx.save();ctx.shadowColor='#ffd700';ctx.shadowBlur=28;

            ctx.moveTo(300,300);ctx.arc(300,300,278,a,a+ARC);ctx.lineTo(300,300);ctx.stroke();
            ctx.restore();
        } else {
            ctx.beginPath();ctx.fillStyle=s.c;
            ctx.moveTo(300,300);ctx.arc(300,300,280,a,a+ARC);ctx.fill();
        }
        if(i===hi&&hlRemain>0){
            const pulse=0.45+0.55*Math.abs(Math.sin(phase*0.009));
            ctx.save();
            const hg=ctx.createRadialGradient(300,300,80,300,300,280);
            hg.addColorStop(0,`rgba(255,255,180,${0.22*pulse})`);
            hg.addColorStop(0.6,`rgba(255,210,0,${0.4*pulse})`);
            hg.addColorStop(1,`rgba(255,160,0,0)`);
            ctx.beginPath();ctx.fillStyle=hg;
            ctx.moveTo(300,300);ctx.arc(300,300,280,a,a+ARC);ctx.fill();
            ctx.shadowColor=`rgba(255,220,50,${pulse})`;ctx.shadowBlur=32;
            ctx.beginPath();ctx.strokeStyle=`rgba(255,230,60,${0.95*pulse})`;ctx.lineWidth=9;
            ctx.moveTo(300,300);ctx.arc(300,300,274,a,a+ARC);ctx.lineTo(300,300);ctx.stroke();
            ctx.restore();
        }
        ctx.beginPath();ctx.strokeStyle='rgba(255,255,255,0.1)';ctx.lineWidth=1;
        ctx.moveTo(300,300);ctx.arc(300,300,280,a,a+ARC);ctx.lineTo(300,300);ctx.stroke();
        ctx.save();ctx.translate(300,300);ctx.rotate(a+ARC/2);
        if(s.isSB){
            ctx.shadowColor='#ffd700';ctx.shadowBlur=16;
            ctx.fillStyle='#fff';ctx.font='bold 13px Arial';
            ctx.fillText('SUPER',118,-8);ctx.fillText('BONUS',118,8);
            ctx.font='bold 10px Arial';ctx.fillStyle='#ffe066';
            ctx.fillText('500 TON',116,24);ctx.shadowBlur=0;
        } else {
            ctx.fillStyle='white';ctx.font='bold 24px Arial';
            ctx.fillText(s.t,148,8);
        }
        ctx.restore();
    });
}

function startHighlight(idx){
    hlIdx=idx;hlRemain=4000;hlPhase=0;
    let last=null;
    function loop(now){
        if(!last)last=now;
        const dt=now-last;last=now;
        hlRemain-=dt;hlPhase+=dt;
        draw(curAngle,hlRemain>0?hlIdx:-1,hlPhase);
        if(hlRemain>0)hlRAF=requestAnimationFrame(loop);
        else{hlIdx=-1;draw(curAngle,-1,0);}
    }
    if(hlRAF)cancelAnimationFrame(hlRAF);
    hlRAF=requestAnimationFrame(loop);
}

const ptrEl=document.getElementById('ptr');
let ptrAngle=0,ptrVel=0,ptrTarget=0,ptrRAF=null,ptrLast=null;

function animPointer(now){
    if(!ptrLast)ptrLast=now;
    const dt=Math.min(now-ptrLast,50)/1000;ptrLast=now;
    const err=ptrTarget-ptrAngle;
    ptrVel+=(20*err-7*ptrVel)*dt;ptrAngle+=ptrVel*dt;
    ptrEl.style.transform=`translateX(-50%) rotate(${ptrAngle.toFixed(2)}deg)`;
    if(Math.abs(err)>0.05||Math.abs(ptrVel)>0.05){ptrRAF=requestAnimationFrame(animPointer);}
    else{ptrAngle=ptrTarget;ptrVel=0;ptrEl.style.transform=`translateX(-50%) rotate(${ptrAngle}deg)`;ptrRAF=null;ptrLast=null;}
}
function setPointerLean(deg){
    ptrTarget=Math.max(-30,Math.min(30,deg));
    if(!ptrRAF){ptrLast=null;ptrRAF=requestAnimationFrame(animPointer);}
}

function getWeightedRandom(){
    const avail=sectors.map((s,i)=>({...s,idx:i})).filter(s=>!s.isSB);
    const total=avail.reduce((sum,s)=>sum+s.weight,0);
    let r=Math.random()*total;
    for(const s of avail){r-=s.weight;if(r<=0)return s.idx;}
    return avail[0].idx;
}

function loadBalance(){
    const urlBal=parseInt(new URLSearchParams(location.search).get('balance'));
    if(tg.CloudStorage){
        tg.CloudStorage.getItem(`balance_${userId}`,(err,val)=>{
            const saved=(!err&&val)?parseInt(val):NaN;
            if(!isNaN(saved)&&saved>=0){stars=(!isNaN(urlBal)&&urlBal>saved)?urlBal:saved;}
            else{stars=(!isNaN(urlBal)&&urlBal>=0)?urlBal:0;}
            if(!isNaN(urlBal)&&urlBal>(isNaN(saved)?-1:saved))saveBalance();
            update();
        });
    } else {stars=(!isNaN(parseInt(new URLSearchParams(location.search).get('balance')))&&parseInt(new URLSearchParams(location.search).get('balance'))>=0)?parseInt(new URLSearchParams(location.search).get('balance')):0;update();}
}

function saveBalance(cb){
    if(tg.CloudStorage){tg.CloudStorage.setItem(`balance_${userId}`,String(stars),err=>{if(!err)console.log('saved:',stars);if(cb)cb();});}
    else if(cb)cb();
}

function update(){
    document.getElementById('s_bal').innerText=stars;
    document.getElementById('cur_bet').innerText=curBet;
    const btn=document.getElementById('spinBtn');
    if(hasFreeSpins>0){btn.innerText=`🎁 FREE SPIN (${hasFreeSpins})`;btn.classList.remove('dep-mode');btn.classList.add('free-mode');}
    else if(stars<curBet){btn.innerText='ПОПОЛНИТЬ';btn.classList.add('dep-mode');btn.classList.remove('free-mode');}
    else{btn.innerText='КРУТИТЬ';btn.classList.remove('dep-mode','free-mode');}
    document.getElementById('btn-minus').disabled=isSpinning;
    document.getElementById('btn-plus').disabled=isSpinning;
}

const histArr=[];
function addHistory(label,cls){
    histArr.unshift({label,cls});
    if(histArr.length>12)histArr.pop();
    const bar=document.getElementById('history-bar');
    bar.innerHTML='';
    histArr.forEach(item=>{const c=document.createElement('div');c.className=`h-chip ${item.cls}`;c.textContent=item.label;bar.appendChild(c);});
}

function angleForSector(idx){return -Math.PI/2-idx*ARC-ARC/2;}

function toggleFast(){
    playClick();fastMode=!fastMode;
    document.getElementById('fast-btn').classList.toggle('active',fastMode);
}

function handleSpin(){
    if(isSpinning)return;
    if(hasFreeSpins===0&&stars<curBet){openM();return;}
    if(hlRAF){cancelAnimationFrame(hlRAF);hlRAF=null;hlIdx=-1;}
    resumeAudio().then(()=>{startBgMusic();doSpin();});
}

function doSpin(){
    playClick();
    charSpin();
    isSpinning=true;update();
    let isFree=false;
    if(hasFreeSpins>0){hasFreeSpins--;isFree=true;}
    else{stars-=curBet;}
    saveBalance();
    const finalIdx=getWeightedRandom();
    let finalAngle=angleForSector(finalIdx);
    while(finalAngle<curAngle+Math.PI*2*6)finalAngle+=Math.PI*2;
    finalAngle+=Math.floor(Math.random()*3)*Math.PI*2;
    const totalRot=finalAngle-curAngle;
    const startAng=curAngle;
    const dur=fastMode?800:4000+Math.random()*1500;
    function eased(p){return p<0.5?16*p*p*p*p*p:1-Math.pow(-2*p+2,5)/2;}
    let t0=null,lastSpd=45,prevE=0;
    startRatchet(fastMode?15:45);
    function frame(now){
        if(!t0)t0=now;
        const p=Math.min((now-t0)/dur,1);
        const e=eased(p);const de=e-prevE;prevE=e;
        curAngle=startAng+totalRot*e;draw(curAngle,-1,0);
        const radVel=totalRot*de/0.016;
        const lean=Math.min(30,Math.abs(radVel)*0.09);
        setPointerLean(radVel>0?-lean:lean);
        const spd=p>0.88?220:p>0.68?110:45;
        if(!fastMode&&spd!==lastSpd){lastSpd=spd;startRatchet(spd);}
        if(p<1){requestAnimationFrame(frame);return;}
        stopRatchet();setPointerLean(0);isSpinning=false;curAngle=finalAngle;update();
        const win=sectors[finalIdx];let winAmount=0;
        if(win.isFree){hasFreeSpins++;playFree();charFree();if(tg.HapticFeedback)tg.HapticFeedback.notificationOccurred('success');addHistory('🎁 FREE','h-free');}
        else if(win.mult>0){winAmount=curBet*win.mult;stars+=winAmount;playWin();charWin();if(tg.HapticFeedback)tg.HapticFeedback.notificationOccurred('success');addHistory(isFree?`🎁+${winAmount}⭐`:`${win.t} +${winAmount}⭐`,'h-win');}
        else{playLose();charLose();if(tg.HapticFeedback)tg.HapticFeedback.notificationOccurred('error');addHistory(isFree?'🎁💀':`-${curBet}⭐`,'h-lose');}
        startHighlight(finalIdx);saveBalance();update();
    }
    requestAnimationFrame(frame);
}

function openM(){playClick();document.getElementById('modal').classList.add('open');}
function closeM(){playClick();document.getElementById('modal').classList.remove('open');}
function setTab(t,el){
    playClick();
    document.querySelectorAll('.tab,.tab-content').forEach(e=>e.classList.remove('active'));
    document.getElementById(t).classList.add('active');el.classList.add('active');
}

function doDep(){
    playClick();
    const val=parseInt(document.getElementById('dep_val').value);
    if(!val||isNaN(val)||val<MIN_DEPOSIT){alert(`Минимум ${MIN_DEPOSIT} звезд`);return;}
    tg.sendData(JSON.stringify({action:'deposit',amount:val,userId:userId}));
}

function calcWit(){
    const v=parseInt(document.getElementById('w_stars').value)||0;
    document.getElementById('wit_preview').textContent=v>0?`Вы получите: ${(v*tonPerStar).toFixed(4)} TON`:'Вы получите: — TON';
}

function doWit(){
    playClick();
    const val=parseInt(document.getElementById('w_stars').value);
    const addr=document.getElementById('w_addr').value.trim();
    const memo=document.getElementById('w_memo').value.trim();
    if(!addr){alert('Введите адрес TON');return;}
    if(!val||isNaN(val)||val<=0){alert('Введите сумму');return;}
    if(val<MIN_WITHDRAW){alert(`Минимум ${MIN_WITHDRAW} звезд`);return;}
    if(val>stars){alert(`Недостаточно звезд (у вас ${stars})`);return;}
    const ton=(val*tonPerStar).toFixed(4);
    const rateText=`1 zvezda = ${tonPerStar.toFixed(6)} TON`;
    stars-=val;saveBalance();update();
    tg.sendData(JSON.stringify({action:'withdraw',stars:val,ton:ton,rate:rateText,address:addr,memo:memo||'-',balanceAfter:stars,userId:userId}));
}

function adjBet(v){
    if(isSpinning)return;playClick();
    curBet=Math.max(5,curBet+v);update();
}

window.addEventListener('beforeunload',()=>saveBalance());
window.addEventListener('DOMContentLoaded',()=>{loadBalance();draw(0,-1,0);});
</script>
