<script>
const tg = window.Telegram.WebApp;
tg.expand();

let stars        = 0;
let curBet       = 5;
let isSpinning   = false;
let hasFreeSpins = 0;
let fastMode     = false;
let userId       = new URLSearchParams(location.search).get('uid') || 'unknown';

const MIN_WITHDRAW = 500;
const MIN_DEPOSIT  = 10;
let tonPerStar = 0.013333;

(async function fetchTonRate() {
    try {
        const res = await fetch(
            'https://api.coingecko.com/api/v3/simple/price?ids=the-open-network&vs_currencies=usd',
            { cache: 'no-cache' }
        );
        if (res.ok) {
            const json   = await res.json();
            const tonUsd = json['the-open-network']?.usd;
            if (tonUsd && tonUsd > 0) {
                tonPerStar = 0.013 / tonUsd;
                document.getElementById('rate-label').textContent =
                    `Курс: 1 ⭐ = ${tonPerStar.toFixed(5)} TON  (1 TON = $${tonUsd.toFixed(2)})`;
                calcWit(); return;
            }
        }
    } catch (_) {}
    document.getElementById('rate-label').textContent = `Курс: 1 ⭐ = ${tonPerStar.toFixed(5)} TON`;
})();

/* ── ЧАСТИЦЫ ── */
(function spawnParticles() {
    const container = document.getElementById('particles');
    const items = ['⭐','💫','✨','🌟','⭐','💎','⭐','✨'];
    function spawn() {
        const el = document.createElement('div');
        el.className = 'particle';
        el.textContent = items[Math.floor(Math.random() * items.length)];
        const size = 10 + Math.random() * 18;
        const dur  = 6 + Math.random() * 10;
        const delay = Math.random() * 8;
        el.style.cssText = `left:${Math.random()*100}%;font-size:${size}px;animation-duration:${dur}s;animation-delay:${delay}s;filter:blur(${Math.random()<0.4?1:0}px) drop-shadow(0 0 4px gold);`;
        container.appendChild(el);
        setTimeout(() => el.remove(), (dur + delay) * 1000);
    }
    for (let i = 0; i < 18; i++) spawn();
    setInterval(spawn, 1200);
})();

/* ══════════════════════════════════════
   ПЕРСОНАЖ — Король (canvas 176×176)
   Анимация НИКОГДА не ускоряется от fastMode
══════════════════════════════════════ */
const cc   = document.getElementById('char-canvas');
const cctx = cc.getContext('2d');

let charMood      = 'idle';
let charStateTimer = null;

// Время
let charLastTs = 0;
let charTime   = 0;

// Моргание — медленное, реалистичное
let blinkOpenness  = 1;       // 1=открыт, 0=закрыт
let blinkState     = 'wait';  // wait | closing | closed | opening
let blinkWaitTimer = 3.5 + Math.random() * 3; // секунды до следующего моргания
let blinkPhaseT    = 0;       // время внутри фазы

// Взгляд
let lookX = 0, lookY = 0;
let lookTX = 0, lookTY = 0;
let lookChangeT = 0;

// Дыхание
let breathPhase = 0;

// Состояние анимации настроения
let moodTime = 0;

// Звёздочки победы
let winStarsArr = [];

// Helper: rounded rect
function rrect(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
}

function setCharMood(mood, duration) {
    charMood = mood;
    moodTime = 0;
    winStarsArr = [];
    if (charStateTimer) clearTimeout(charStateTimer);
    if (duration) charStateTimer = setTimeout(() => {
        charMood = 'idle'; moodTime = 0;
    }, duration);
}

function updateCharLogic(dt) {
    // dt — реальное время, не зависит от fastMode
    charTime += dt;
    moodTime += dt;

    // Дыхание
    breathPhase += dt * 1.1; // ~1 вдох за 5.7 сек

    // ── МОРГАНИЕ (медленное, реалистичное) ──
    switch (blinkState) {
        case 'wait':
            blinkWaitTimer -= dt;
            if (blinkWaitTimer <= 0) {
                blinkState  = 'closing';
                blinkPhaseT = 0;
            }
            break;
        case 'closing':
            blinkPhaseT += dt;
            blinkOpenness = Math.max(0, 1 - blinkPhaseT / 0.10);
            if (blinkOpenness <= 0) { blinkState = 'closed'; blinkPhaseT = 0; }
            break;
        case 'closed':
            blinkPhaseT += dt;
            if (blinkPhaseT >= 0.07) { blinkState = 'opening'; blinkPhaseT = 0; }
            break;
        case 'opening':
            blinkPhaseT += dt;
            blinkOpenness = Math.min(1, blinkPhaseT / 0.13);
            if (blinkOpenness >= 1) {
                blinkState     = 'wait';
                blinkWaitTimer = 3 + Math.random() * 4.5; // следующее моргание через 3-7.5 сек
            }
            break;
    }

    // ── ВЗГЛЯД ──
    const win  = charMood === 'win';
    const lose = charMood === 'lose';
    const watching = charMood === 'watching';

    if (charMood === 'idle') {
        lookChangeT -= dt;
        if (lookChangeT <= 0) {
            lookTX = (Math.random() * 2 - 1) * 0.75;
            lookTY = (Math.random() * 2 - 1) * 0.45;
            lookChangeT = 2 + Math.random() * 3.5;
        }
    } else if (watching) {
        lookTX = -0.75; lookTY = -0.15;
    } else if (lose) {
        lookTX = 0; lookTY = 0.65;
    } else if (win) {
        lookTX = 0; lookTY = -0.25;
    }
    const lerpSpd = dt * 3.5;
    lookX += (lookTX - lookX) * Math.min(1, lerpSpd);
    lookY += (lookTY - lookY) * Math.min(1, lerpSpd);

    // ── ПОБЕДНЫЕ ЗВЁЗДОЧКИ ──
    if (win) {
        winStarsArr = winStarsArr.filter(s => s.life > 0);
        winStarsArr.forEach(s => {
            s.x   += s.vx * dt;
            s.y   += s.vy * dt;
            s.vy  += 20 * dt; // лёгкая гравитация
            s.life -= dt;
        });
        if (Math.random() < 0.28) {
            winStarsArr.push({
                x:    30 + Math.random() * 116,
                y:    40 + Math.random() * 40,
                vx:   (Math.random() - 0.5) * 55,
                vy:   -35 - Math.random() * 25,
                life: 0.7 + Math.random() * 0.7,
                size: 9 + Math.random() * 11
            });
        }
    } else {
        winStarsArr = [];
    }
}

function drawKingChar() {
    const W = 176, H = 176;
    cctx.clearRect(0, 0, W, H);

    const win      = charMood === 'win';
    const lose     = charMood === 'lose';
    const watching = charMood === 'watching';

    // Дыхание
    const breath = Math.sin(breathPhase) * 1.8;

    // Смещение тела по состоянию
    let globalY = breath * 0.4;
    if (lose) globalY += Math.min(moodTime * 9, 5);
    if (win)  globalY -= Math.abs(Math.sin(moodTime * 2.8)) * 4;

    // Покачивание плеч при проигрыше
    const shoulderDroop = lose ? Math.min(moodTime / 0.8, 1) * 5 : 0;

    const cx   = W / 2;
    const headY = 50 + globalY;
    const bodyY = headY + 29;
    const headR = 26;

    // ═══════════════════════════════
    // МАНТИЯ (фон, рисуется первой)
    // ═══════════════════════════════
    const capeColor = win ? '#5b1695' : lose ? '#2d0d5e' : '#4a1080';
    cctx.beginPath();
    cctx.moveTo(cx - 26, headY + 18 + shoulderDroop);
    cctx.bezierCurveTo(
        cx - 42, bodyY + 18,
        cx - 36, bodyY + 44,
        cx - 28, bodyY + 60
    );
    cctx.lineTo(cx + 28, bodyY + 60);
    cctx.bezierCurveTo(
        cx + 36, bodyY + 44,
        cx + 42, bodyY + 18,
        cx + 26, headY + 18 + shoulderDroop
    );
    cctx.fillStyle = capeColor;
    cctx.fill();
    // Меховая опушка мантии
    cctx.strokeStyle = '#ddd0c0';
    cctx.lineWidth   = 7;
    cctx.lineJoin    = 'round';
    cctx.stroke();

    // ═══════════════════════════════
    // ТЕЛО (туловище)
    // ═══════════════════════════════
    const bodyColor = win ? '#7c3aed' : lose ? '#3d1a7a' : '#6d28d9';
    rrect(cctx, cx - 22, bodyY - 2, 44, 38, 7);
    cctx.fillStyle = bodyColor;
    cctx.fill();

    // Вертикальный орнамент на груди
    cctx.fillStyle = 'rgba(255,215,0,0.25)';
    rrect(cctx, cx - 5, bodyY, 10, 20, 3);
    cctx.fill();

    // Пояс
    cctx.fillStyle = '#92640a';
    cctx.fillRect(cx - 22, bodyY + 22, 44, 9);
    // Пряжка
    cctx.fillStyle = '#f6e05e';
    rrect(cctx, cx - 6, bodyY + 21, 12, 11, 2);
    cctx.fill();
    cctx.strokeStyle = '#92640a'; cctx.lineWidth = 1.5; cctx.stroke();

    // ═══════════════════════════════
    // НОГИ
    // ═══════════════════════════════
    cctx.fillStyle = '#1e1b4b';
    rrect(cctx, cx - 17, bodyY + 34, 14, 26, 4);
    cctx.fill();
    rrect(cctx, cx + 3,  bodyY + 34, 14, 26, 4);
    cctx.fill();
    // Ботинки
    cctx.fillStyle = '#2d3748';
    rrect(cctx, cx - 20, bodyY + 56, 17,  9, 4);
    cctx.fill();
    rrect(cctx, cx + 3,  bodyY + 56, 17,  9, 4);
    cctx.fill();

    // ═══════════════════════════════
    // ЛЕВАЯ РУКА
    // ═══════════════════════════════
    const armColor = bodyColor;
    cctx.lineWidth = 10; cctx.lineCap = 'round';
    cctx.strokeStyle = armColor;
    cctx.beginPath();
    if (win) {
        // Рука вверх при победе
        const t = Math.min(moodTime / 0.7, 1);
        cctx.moveTo(cx - 21, bodyY + 6 + shoulderDroop);
        cctx.quadraticCurveTo(cx - 34, bodyY - 4 - t * 18, cx - 28, bodyY - 10 - t * 22);
    } else if (lose) {
        cctx.moveTo(cx - 21, bodyY + 6 + shoulderDroop);
        cctx.quadraticCurveTo(cx - 34, bodyY + 28, cx - 26, bodyY + 40);
    } else {
        cctx.moveTo(cx - 21, bodyY + 6);
        cctx.quadraticCurveTo(cx - 36, bodyY + 18, cx - 30, bodyY + 30);
    }
    cctx.stroke();

    // ═══════════════════════════════
    // ПРАВАЯ РУКА + МЕЧ
    // ═══════════════════════════════
    // Позиция конца руки (куда держит меч)
    let handX, handY, swordAngle;

    if (win) {
        const t = Math.min(moodTime / 0.75, 1);
        const ease = t < 0.5 ? 2*t*t : -1+(4-2*t)*t; // easeInOut
        handX      = cx + 24 + ease * 4;
        handY      = bodyY + 6 - ease * 32;
        swordAngle = -Math.PI * 0.55 * ease; // поднимается вверх
    } else if (lose) {
        const t    = Math.min(moodTime / 0.9, 1);
        handX      = cx + 22;
        handY      = bodyY + 8 + shoulderDroop;
        swordAngle = t * 0.25; // слегка опускается
    } else {
        handX      = cx + 22;
        handY      = bodyY + 8;
        swordAngle = 0;
    }

    // Рука
    cctx.strokeStyle = armColor;
    cctx.lineWidth = 10; cctx.lineCap = 'round';
    cctx.beginPath();
    cctx.moveTo(cx + 21, bodyY + 6 + shoulderDroop);
    cctx.quadraticCurveTo(cx + 28, bodyY + 6, handX, handY);
    cctx.stroke();

    // МЕЧ
    cctx.save();
    cctx.translate(handX, handY);
    cctx.rotate(swordAngle);

    const bladeDir = win && moodTime > 0.3 ? -1 : 1; // вверх или вниз
    const bladeLen = 46;

    // Рукоять
    cctx.fillStyle = '#92640a';
    rrect(cctx, -5, -7, 10, 14, 2);
    cctx.fill();

    // Гарда (крестовина)
    cctx.fillStyle = '#c9922b';
    rrect(cctx, -13, -3, 26, 7, 2);
    cctx.fill();
    cctx.strokeStyle = '#7a4800'; cctx.lineWidth = 1; cctx.stroke();

    // Кристалл на гарде
    cctx.beginPath();
    cctx.arc(0, 0, 4, 0, Math.PI * 2);
    cctx.fillStyle = win ? '#93c5fd' : '#e2e8f0';
    cctx.fill();

    // Клинок
    const bladeStartY = bladeDir * 7;
    const bladeTipY   = bladeDir * (7 + bladeLen);
    const bladeGrad   = cctx.createLinearGradient(-3, bladeStartY, 3, bladeTipY);
    if (win && moodTime > 0.4) {
        bladeGrad.addColorStop(0, '#e0f2ff');
        bladeGrad.addColorStop(0.5, '#93c5fd');
        bladeGrad.addColorStop(1, '#3b82f6');
    } else {
        bladeGrad.addColorStop(0, '#f0f4f8');
        bladeGrad.addColorStop(0.6, '#cbd5e0');
        bladeGrad.addColorStop(1, '#718096');
    }
    cctx.beginPath();
    cctx.moveTo(-3.5, bladeStartY);
    cctx.lineTo(3.5,  bladeStartY);
    cctx.lineTo(0,    bladeTipY);
    cctx.closePath();
    cctx.fillStyle = bladeGrad;
    cctx.fill();

    // Свечение меча при победе
    if (win && moodTime > 0.45) {
        const glow = Math.sin(moodTime * 5) * 0.3 + 0.7;
        cctx.save();
        cctx.shadowColor = '#60a5fa';
        cctx.shadowBlur  = 16 * glow;
        cctx.beginPath();
        cctx.moveTo(-2, bladeStartY);
        cctx.lineTo(2,  bladeStartY);
        cctx.lineTo(0,  bladeTipY);
        cctx.closePath();
        cctx.fillStyle = `rgba(147,197,253,${0.35 * glow})`;
        cctx.fill();
        cctx.restore();
    }

    cctx.restore(); // конец меча

    // ═══════════════════════════════
    // ГОЛОВА
    // ═══════════════════════════════
    // Небольшой наклон головы при наблюдении
    const headTilt = watching ? -0.07 : lose ? 0.08 : 0;
    cctx.save();
    cctx.translate(cx, headY);
    cctx.rotate(headTilt);

    // Лицо
    cctx.beginPath();
    cctx.arc(0, 0, headR, 0, Math.PI * 2);
    const faceGrad = cctx.createRadialGradient(-6, -7, 3, 0, 0, headR);
    faceGrad.addColorStop(0, '#fde68a');
    faceGrad.addColorStop(1, '#d97706');
    cctx.fillStyle = faceGrad;
    cctx.fill();
    cctx.strokeStyle = 'rgba(0,0,0,0.12)'; cctx.lineWidth = 1.5; cctx.stroke();

    // ═══════════════════════════════
    // КОРОНА
    // ═══════════════════════════════
    const crownBase = -headR - 3;
    const crownH    = 20;
    cctx.fillStyle = '#f6e05e';
    cctx.beginPath();
    // Основа
    cctx.rect(-21, crownBase - 10, 42, 13);
    // Зубцы
    cctx.moveTo(-21, crownBase - 10);
    cctx.lineTo(-15, crownBase - 10 - crownH * 0.55);
    cctx.lineTo(-8,  crownBase - 10 - crownH * 0.25);
    cctx.lineTo(0,   crownBase - 10 - crownH);
    cctx.lineTo(8,   crownBase - 10 - crownH * 0.25);
    cctx.lineTo(15,  crownBase - 10 - crownH * 0.55);
    cctx.lineTo(21,  crownBase - 10);
    cctx.fill();
    cctx.strokeStyle = '#b7791f'; cctx.lineWidth = 1.8; cctx.stroke();

    // Камни на короне
    const gemData = [
        { x: -13, col: '#e53e3e' },
        { x:   0, col: '#3182ce' },
        { x:  13, col: '#e53e3e' }
    ];
    gemData.forEach(g => {
        cctx.beginPath();
        cctx.arc(g.x, crownBase - 5, 4, 0, Math.PI * 2);
        cctx.fillStyle = g.col; cctx.fill();
        // Блик на камне
        cctx.beginPath();
        cctx.arc(g.x - 1.2, crownBase - 6.2, 1.5, 0, Math.PI * 2);
        cctx.fillStyle = 'rgba(255,255,255,0.65)'; cctx.fill();
    });

    // ═══════════════════════════════
    // БОРОДА И УСЫ
    // ═══════════════════════════════
    // Борода
    cctx.beginPath();
    cctx.ellipse(0, 15, 15, 13, 0, 0, Math.PI);
    cctx.fillStyle = '#9ca3af'; cctx.fill();

    // Линии бороды (текстура)
    cctx.strokeStyle = 'rgba(0,0,0,0.08)'; cctx.lineWidth = 1.2;
    [-5, 0, 5].forEach(xOff => {
        cctx.beginPath();
        cctx.moveTo(xOff, 6);
        cctx.quadraticCurveTo(xOff + 1, 14, xOff, 22);
        cctx.stroke();
    });

    // Усы
    cctx.beginPath();
    cctx.ellipse(-9, 6, 9, 4.5, -0.18, 0, Math.PI * 2);
    cctx.fillStyle = '#9ca3af'; cctx.fill();
    cctx.beginPath();
    cctx.ellipse(9,  6, 9, 4.5,  0.18, 0, Math.PI * 2);
    cctx.fill();

    // ═══════════════════════════════
    // ГЛАЗА
    // ═══════════════════════════════
    const eyeY  = -7;
    const eyeLX = -10, eyeRX = 10;
    const pdx   = lookX * 3.2;
    const pdy   = lookY * 2.2;
    const eyeH  = 7.5 * blinkOpenness; // высота белков зависит от моргания

    if (eyeH > 0.15) {
        // Белки
        cctx.beginPath();
        cctx.ellipse(eyeLX, eyeY, 6.5, Math.max(0.15, eyeH), 0, 0, Math.PI * 2);
        cctx.fillStyle = '#ffffff'; cctx.fill();
        cctx.beginPath();
        cctx.ellipse(eyeRX, eyeY, 6.5, Math.max(0.15, eyeH), 0, 0, Math.PI * 2);
        cctx.fill();

        if (blinkOpenness > 0.25) {
            // Радужка + зрачок
            cctx.beginPath();
            cctx.arc(eyeLX + pdx, eyeY + pdy, 4, 0, Math.PI * 2);
            cctx.fillStyle = '#1e3a5f'; cctx.fill();
            cctx.beginPath();
            cctx.arc(eyeRX + pdx, eyeY + pdy, 4, 0, Math.PI * 2);
            cctx.fill();
            // Блики
            cctx.beginPath();
            cctx.arc(eyeLX + pdx + 1.3, eyeY + pdy - 1.3, 1.4, 0, Math.PI * 2);
            cctx.fillStyle = 'rgba(255,255,255,0.92)'; cctx.fill();
            cctx.beginPath();
            cctx.arc(eyeRX + pdx + 1.3, eyeY + pdy - 1.3, 1.4, 0, Math.PI * 2);
            cctx.fill();
        }
    } else {
        // Закрытые глаза — дуга ресниц
        cctx.strokeStyle = '#7c5c2a'; cctx.lineWidth = 2.2; cctx.lineCap = 'round';
        cctx.beginPath();
        cctx.arc(eyeLX, eyeY, 6, Math.PI * 0.1, Math.PI * 0.9);
        cctx.stroke();
        cctx.beginPath();
        cctx.arc(eyeRX, eyeY, 6, Math.PI * 0.1, Math.PI * 0.9);
        cctx.stroke();
    }

    // Брови
    cctx.lineWidth = 2.8; cctx.lineCap = 'round'; cctx.strokeStyle = '#7c5c2a';
    if (lose) {
        // Грустные — внутренние концы опущены
        cctx.beginPath();
        cctx.moveTo(eyeLX - 7, eyeY - 12);
        cctx.quadraticCurveTo(eyeLX, eyeY - 9, eyeLX + 6, eyeY - 13);
        cctx.stroke();
        cctx.beginPath();
        cctx.moveTo(eyeRX - 6, eyeY - 13);
        cctx.quadraticCurveTo(eyeRX, eyeY - 9, eyeRX + 7, eyeY - 12);
        cctx.stroke();
    } else if (win) {
        // Приподнятые, радостные
        cctx.beginPath();
        cctx.moveTo(eyeLX - 7, eyeY - 15);
        cctx.quadraticCurveTo(eyeLX, eyeY - 19, eyeLX + 6, eyeY - 15);
        cctx.stroke();
        cctx.beginPath();
        cctx.moveTo(eyeRX - 6, eyeY - 15);
        cctx.quadraticCurveTo(eyeRX, eyeY - 19, eyeRX + 7, eyeY - 15);
        cctx.stroke();
    } else {
        // Обычные
        cctx.beginPath();
        cctx.moveTo(eyeLX - 7, eyeY - 12);
        cctx.quadraticCurveTo(eyeLX, eyeY - 14.5, eyeLX + 6, eyeY - 12);
        cctx.stroke();
        cctx.beginPath();
        cctx.moveTo(eyeRX - 6, eyeY - 12);
        cctx.quadraticCurveTo(eyeRX, eyeY - 14.5, eyeRX + 7, eyeY - 12);
        cctx.stroke();
    }

    // ═══════════════════════════════
    // РОТ
    // ═══════════════════════════════
    const mY = 11;
    cctx.lineWidth = 2.8; cctx.lineCap = 'round'; cctx.strokeStyle = '#7c5c2a';
    if (win) {
        // Широкая улыбка
        cctx.beginPath();
        cctx.moveTo(-12, mY - 2);
        cctx.quadraticCurveTo(0, mY + 12, 12, mY - 2);
        cctx.stroke();
        // Зубы
        cctx.beginPath();
        cctx.ellipse(0, mY + 3, 8, 5, 0, 0, Math.PI);
        cctx.fillStyle = 'white'; cctx.fill();
    } else if (lose) {
        // Дуга вниз — грусть
        cctx.beginPath();
        cctx.moveTo(-10, mY + 5);
        cctx.quadraticCurveTo(0, mY - 3, 10, mY + 5);
        cctx.stroke();
    } else if (watching) {
        // Приоткрытый рот — напряжение
        cctx.beginPath();
        cctx.moveTo(-8, mY);
        cctx.quadraticCurveTo(0, mY + 6, 8, mY);
        cctx.stroke();
    } else {
        // Лёгкая улыбка
        cctx.beginPath();
        cctx.moveTo(-9, mY);
        cctx.quadraticCurveTo(0, mY + 8, 9, mY);
        cctx.stroke();
    }

    // Румянец при победе
    if (win) {
        cctx.beginPath();
        cctx.ellipse(-17, 7, 8, 5, -0.2, 0, Math.PI * 2);
        cctx.fillStyle = 'rgba(255,100,100,0.28)'; cctx.fill();
        cctx.beginPath();
        cctx.ellipse(17, 7, 8, 5, 0.2, 0, Math.PI * 2);
        cctx.fill();
    }

    // Слеза при проигрыше
    if (lose && moodTime > 0.6) {
        const alpha = Math.min(1, (moodTime - 0.6) * 2.5);
        const tearY = eyeRX + Math.min((moodTime - 0.6) * 40, 14);
        cctx.beginPath();
        cctx.arc(9, eyeY + tearY - eyeY + 8, 3.5, 0, Math.PI * 2);
        cctx.fillStyle = `rgba(100,180,255,${alpha * 0.88})`;
        cctx.fill();
    }

    cctx.restore(); // конец поворота головы

    // ═══════════════════════════════
    // ПОБЕДНЫЕ ЗВЁЗДОЧКИ
    // ═══════════════════════════════
    if (win) {
        winStarsArr.forEach(s => {
            const alpha = Math.min(1, s.life * 2.5);
            cctx.globalAlpha = alpha;
            cctx.font = `${Math.round(s.size)}px serif`;
            cctx.fillText('⭐', s.x, s.y);
        });
        cctx.globalAlpha = 1;
    }

    // Тёмное облачко при проигрыше
    if (lose && moodTime > 0.8) {
        const alpha = Math.min(0.7, (moodTime - 0.8) * 1.5);
        cctx.globalAlpha = alpha;
        cctx.font = '20px serif';
        cctx.fillText('💨', cx - 24, headY - headR - 30);
        cctx.globalAlpha = 1;
    }
}

function charLoop(ts) {
    // dt всегда реальное время — fastMode не влияет
    const dt = charLastTs ? Math.min((ts - charLastTs) / 1000, 0.05) : 0.016;
    charLastTs = ts;

    updateCharLogic(dt);
    drawKingChar();
    requestAnimationFrame(charLoop);
}
requestAnimationFrame(charLoop);

let soundEnabled = true;
let bgLoopTimer  = null;
let bgGainNode   = null;
const actx       = new (window.AudioContext || window.webkitAudioContext)();

function resumeAudio() {
    return actx.state === 'suspended' ? actx.resume() : Promise.resolve();
}

function startBgMusic() {
    if (!soundEnabled || bgLoopTimer) return;
    bgGainNode = actx.createGain();
    bgGainNode.gain.value = 0.05;
    bgGainNode.connect(actx.destination);
    const melody = [
        [523.25,0.00,0.35],[659.25,0.45,0.35],[783.99,0.90,0.35],
        [1046.5,1.35,0.55],[783.99,2.00,0.25],[659.25,2.35,0.25],
        [523.25,2.70,0.35],[493.88,3.15,0.35],[392.00,3.60,0.35],
        [523.25,4.00,0.40],[659.25,4.50,0.35],[783.99,4.95,0.35],
        [880.00,5.40,0.55],[783.99,6.05,0.25],[659.25,6.40,0.25],[523.25,6.75,0.90]
    ];
    const bass = [[130.81,0],[130.81,1.35],[98,2.7],[130.81,4.0],[130.81,5.4]];
    const LOOP = 8.0;
    function schedule(t0) {
        if (!bgGainNode) return;
        melody.forEach(([f,t,d]) => {
            const o = actx.createOscillator(), g = actx.createGain();
            o.connect(g); g.connect(bgGainNode);
            o.type = 'triangle'; o.frequency.value = f;
            const s = t0 + t;
            g.gain.setValueAtTime(0, s);
            g.gain.linearRampToValueAtTime(0.6, s + 0.03);
            g.gain.exponentialRampToValueAtTime(0.001, s + d);
            o.start(s); o.stop(s + d + 0.05);
        });
        bass.forEach(([f,t]) => {
            const o = actx.createOscillator(), g = actx.createGain();
            o.connect(g); g.connect(bgGainNode);
            o.type = 'sine'; o.frequency.value = f;
            const s = t0 + t;
            g.gain.setValueAtTime(0, s);
            g.gain.linearRampToValueAtTime(0.4, s + 0.05);
            g.gain.exponentialRampToValueAtTime(0.001, s + 0.5);
            o.start(s); o.stop(s + 0.6);
        });
    }
    let t = actx.currentTime + 0.1;
    schedule(t);
    bgLoopTimer = setInterval(() => {
        if (!soundEnabled) { stopBgMusic(); return; }
        t += LOOP; schedule(t);
    }, (LOOP - 0.4) * 1000);
}

function stopBgMusic() {
    if (bgLoopTimer) { clearInterval(bgLoopTimer); bgLoopTimer = null; }
    if (bgGainNode)  { bgGainNode.gain.linearRampToValueAtTime(0, actx.currentTime + 0.3); bgGainNode = null; }
}

function toggleSound() {
    soundEnabled = !soundEnabled;
    document.getElementById('sound-btn').textContent = soundEnabled ? '🔊' : '🔇';
    if (soundEnabled) resumeAudio().then(startBgMusic);
    else stopBgMusic();
}

function playTone(freq, type, dur, vol) {
    if (!soundEnabled) return;
    const o = actx.createOscillator(), g = actx.createGain();
    o.connect(g); g.connect(actx.destination);
    o.type = type; o.frequency.value = freq;
    g.gain.setValueAtTime(vol, actx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, actx.currentTime + dur);
    o.start(); o.stop(actx.currentTime + dur);
}
function playWin()  { [523,659,783,1046].forEach((f,i) => setTimeout(() => playTone(f,'triangle',0.3,0.3), i*80)); }
function playLose() { [300,220,160].forEach((f,i) => setTimeout(() => playTone(f,'sawtooth',0.2,0.2), i*100)); }
function playFree() { [659,880,1108].forEach((f,i) => setTimeout(() => playTone(f,'sine',0.25,0.25), i*90)); }
function playClick() {
    if (!soundEnabled) return;
    playTone(800, 'square', 0.05, 0.1);
    if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
}

let ratchetTimer = null;
function startRatchet(ms) {
    stopRatchet();
    ratchetTimer = setInterval(() => {
        if (!soundEnabled || actx.state === 'suspended') return;
        const o = actx.createOscillator(), g = actx.createGain();
        o.connect(g); g.connect(actx.destination);
        o.type = 'square'; o.frequency.value = 900;
        g.gain.setValueAtTime(0.07, actx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001, actx.currentTime + 0.04);
        o.start(); o.stop(actx.currentTime + 0.04);
    }, ms);
}
function stopRatchet() { if (ratchetTimer) { clearInterval(ratchetTimer); ratchetTimer = null; } }

const SUPERBONUS_IDX = 7;
const sectors = [
    { t:'💀',   c:'#1a1a1a', mult:0,   weight:12.5,  isSB:false, isFree:false },
    { t:'×1',   c:'#555555', mult:1,   weight:6.25,  isSB:false, isFree:false },

    { t:'×1',   c:'#555555', mult:1,   weight:6.25,  isSB:false, isFree:false },
    { t:'×5',   c:'#9b59b6', mult:5,   weight:6,     isSB:false, isFree:false },
    { t:'💀',   c:'#1a1a1a', mult:0,   weight:12.5,  isSB:false, isFree:false },

    { t:'×2',   c:'#3498db', mult:2,   weight:7.5,   isSB:false, isFree:false },
    { t:'FREE', c:'#27ae60', mult:0,   weight:0.005, isSB:false, isFree:true  }
];

const N   = sectors.length;
const ARC = (Math.PI * 2) / N;

const canvas = document.getElementById('canvas');
const ctx    = canvas.getContext('2d');
let curAngle = 0;

let hlIdx = -1, hlPhase = 0, hlRemain = 0, hlRAF = null;

function draw(angle, hi, phase) {
    ctx.clearRect(0, 0, 600, 600);
    sectors.forEach((s, i) => {
        const a = i * ARC + angle;
        if (s.isSB) {
            const gr = ctx.createRadialGradient(300,300,60,300,300,280);
            gr.addColorStop(0,'#fff3a0'); gr.addColorStop(0.3,'#ffd700');
            gr.addColorStop(0.7,'#cc8800'); gr.addColorStop(1,'#7a4800');
            ctx.beginPath(); ctx.fillStyle = gr;
            ctx.moveTo(300,300); ctx.arc(300,300,280,a,a+ARC); ctx.fill();
            ctx.save();
            ctx.shadowColor = '#ffd700'; ctx.shadowBlur = 28;
            ctx.beginPath(); ctx.strokeStyle = '#ffd700'; ctx.lineWidth = 4;
            ctx.moveTo(300,300); ctx.arc(300,300,278,a,a+ARC); ctx.lineTo(300,300); ctx.stroke();
            ctx.restore();
        } else {
            ctx.beginPath(); ctx.fillStyle = s.c;
            ctx.moveTo(300,300); ctx.arc(300,300,280,a,a+ARC); ctx.fill();
        }
        if (i === hi && hlRemain > 0) {
            const pulse = 0.45 + 0.55 * Math.abs(Math.sin(phase * 0.009));
            ctx.save();
            const hg = ctx.createRadialGradient(300,300,80,300,300,280);
            hg.addColorStop(0,`rgba(255,255,180,${0.22*pulse})`);
            hg.addColorStop(0.6,`rgba(255,210,0,${0.4*pulse})`);
            hg.addColorStop(1,`rgba(255,160,0,0)`);
            ctx.beginPath(); ctx.fillStyle = hg;
            ctx.moveTo(300,300); ctx.arc(300,300,280,a,a+ARC); ctx.fill();
            ctx.shadowColor = `rgba(255,220,50,${pulse})`; ctx.shadowBlur = 32;
            ctx.beginPath();
            ctx.strokeStyle = `rgba(255,230,60,${0.95*pulse})`; ctx.lineWidth = 9;
            ctx.moveTo(300,300); ctx.arc(300,300,274,a,a+ARC); ctx.lineTo(300,300); ctx.stroke();
            ctx.restore();
        }
        ctx.beginPath(); ctx.strokeStyle = 'rgba(255,255,255,0.1)'; ctx.lineWidth = 1;
        ctx.moveTo(300,300); ctx.arc(300,300,280,a,a+ARC); ctx.lineTo(300,300); ctx.stroke();
        ctx.save(); ctx.translate(300,300); ctx.rotate(a + ARC/2);
        if (s.isSB) {
            ctx.shadowColor = '#ffd700'; ctx.shadowBlur = 16;
            ctx.fillStyle = '#fff'; ctx.font = 'bold 13px Arial';
            ctx.fillText('SUPER', 118, -8); ctx.fillText('BONUS', 118, 8);
            ctx.font = 'bold 10px Arial'; ctx.fillStyle = '#ffe066';
            ctx.fillText('500 TON', 116, 24); ctx.shadowBlur = 0;
        } else {
            ctx.fillStyle = 'white'; ctx.font = 'bold 24px Arial';
            ctx.fillText(s.t, 148, 8);
        }
        ctx.restore();
    });
}

function startHighlight(idx) {
    hlIdx = idx; hlRemain = 4000; hlPhase = 0;
    let last = null;
    function loop(now) {
        if (!last) last = now;
        const dt = now - last; last = now;
        hlRemain -= dt; hlPhase += dt;
        draw(curAngle, hlRemain > 0 ? hlIdx : -1, hlPhase);
        if (hlRemain > 0) hlRAF = requestAnimationFrame(loop);
        else { hlIdx = -1; draw(curAngle, -1, 0); }
    }
    if (hlRAF) cancelAnimationFrame(hlRAF);
    hlRAF = requestAnimationFrame(loop);
}

const ptrEl = document.getElementById('ptr');
let ptrAngle = 0, ptrVel = 0, ptrTarget = 0;
let ptrRAF = null, ptrLast = null;

function animPointer(now) {
    if (!ptrLast) ptrLast = now;
    const dt = Math.min(now - ptrLast, 50) / 1000;
    ptrLast = now;
    const err = ptrTarget - ptrAngle;
    ptrVel += (20 * err - 7 * ptrVel) * dt;
    ptrAngle += ptrVel * dt;
    ptrEl.style.transform = `translateX(-50%) rotate(${ptrAngle.toFixed(2)}deg)`;
    if (Math.abs(err) > 0.05 || Math.abs(ptrVel) > 0.05) {
        ptrRAF = requestAnimationFrame(animPointer);
    } else {
        ptrAngle = ptrTarget; ptrVel = 0;
        ptrEl.style.transform = `translateX(-50%) rotate(${ptrAngle}deg)`;
        ptrRAF = null; ptrLast = null;
    }
}
function setPointerLean(deg) {
    ptrTarget = Math.max(-30, Math.min(30, deg));
    if (!ptrRAF) { ptrLast = null; ptrRAF = requestAnimationFrame(animPointer); }
}

function getWeightedRandom() {
    const avail = sectors.map((s,i) => ({...s, idx:i})).filter(s => !s.isSB);
    const total = avail.reduce((sum, s) => sum + s.weight, 0);
    let r = Math.random() * total;
    for (const s of avail) { r -= s.weight; if (r <= 0) return s.idx; }
    return avail[0].idx;
}

function loadBalance() {
    const urlBal = parseInt(new URLSearchParams(location.search).get('balance'));
    if (tg.CloudStorage) {
        tg.CloudStorage.getItem(`balance_${userId}`, (err, val) => {
            const saved = (!err && val) ? parseInt(val) : NaN;
            if (!isNaN(saved) && saved >= 0) {
                stars = (!isNaN(urlBal) && urlBal > saved) ? urlBal : saved;
            } else {
                stars = (!isNaN(urlBal) && urlBal >= 0) ? urlBal : 0;
            }
            if (!isNaN(urlBal) && urlBal > (isNaN(saved) ? -1 : saved)) saveBalance();
            update();
        });
    } else {
        stars = (!isNaN(urlBal) && urlBal >= 0) ? urlBal : 0;
        update();
    }
}

function saveBalance(cb) {
    if (tg.CloudStorage) {
        tg.CloudStorage.setItem(`balance_${userId}`, String(stars), err => {
            if (!err) console.log('saved:', stars);
            if (cb) cb();
        });
    } else if (cb) cb();
}

function update() {
    document.getElementById('s_bal').innerText   = stars;
    document.getElementById('cur_bet').innerText = curBet;
    const btn = document.getElementById('spinBtn');
    if (hasFreeSpins > 0) {
        btn.innerText = `🎁 FREE SPIN (${hasFreeSpins})`;
        btn.classList.remove('dep-mode'); btn.classList.add('free-mode');
    } else if (stars < curBet) {
        btn.innerText = 'ПОПОЛНИТЬ';
        btn.classList.add('dep-mode'); btn.classList.remove('free-mode');
    } else {
        btn.innerText = 'КРУТИТЬ';
        btn.classList.remove('dep-mode', 'free-mode');
    }
    document.getElementById('btn-minus').disabled = isSpinning;
    document.getElementById('btn-plus').disabled  = isSpinning;
}

const histArr = [];
function addHistory(label, cls) {
    histArr.unshift({ label, cls });
    if (histArr.length > 12) histArr.pop();
    const bar = document.getElementById('history-bar');
    bar.innerHTML = '';
    histArr.forEach(item => {
        const c = document.createElement('div');
        c.className = `h-chip ${item.cls}`;
        c.textContent = item.label;
        bar.appendChild(c);
    });
}

function angleForSector(idx) {
    return -Math.PI / 2 - idx * ARC - ARC / 2;
}

function toggleFast() {
    playClick();
    fastMode = !fastMode;
    document.getElementById('fast-btn').classList.toggle('active', fastMode);
}

function handleSpin() {
    if (isSpinning) return;
    if (hasFreeSpins === 0 && stars < curBet) { openM(); return; }
    if (hlRAF) { cancelAnimationFrame(hlRAF); hlRAF = null; hlIdx = -1; }
    resumeAudio().then(() => { startBgMusic(); doSpin(); });
}

function doSpin() {
    playClick();
    charSpin();
    isSpinning = true;
    update();

    let isFree = false;
    if (hasFreeSpins > 0) { hasFreeSpins--; isFree = true; }
    else                   { stars -= curBet; }
    saveBalance();

    const finalIdx = getWeightedRandom();

    let finalAngle = angleForSector(finalIdx);
    while (finalAngle < curAngle + Math.PI * 2 * 6) finalAngle += Math.PI * 2;
    finalAngle += Math.floor(Math.random() * 3) * Math.PI * 2;

    const totalRot = finalAngle - curAngle;
    const startAng = curAngle;
    const dur = fastMode ? 800 : 4000 + Math.random() * 1500;

    function eased(p) {
        return p < 0.5 ? 16 * p * p * p * p * p : 1 - Math.pow(-2 * p + 2, 5) / 2;
    }

    let t0 = null, lastSpd = 45, prevE = 0;
    startRatchet(fastMode ? 15 : 45);

    function frame(now) {
        if (!t0) t0 = now;
        const p  = Math.min((now - t0) / dur, 1);
        const e  = eased(p);
        const de = e - prevE; prevE = e;

        curAngle = startAng + totalRot * e;
        draw(curAngle, -1, 0);

        const radVel = totalRot * de / 0.016;
        const lean   = Math.min(30, Math.abs(radVel) * 0.09);
        setPointerLean(radVel > 0 ? -lean : lean);

        const spd = p > 0.88 ? 220 : p > 0.68 ? 110 : 45;
        if (!fastMode && spd !== lastSpd) { lastSpd = spd; startRatchet(spd); }

        if (p < 1) { requestAnimationFrame(frame); return; }

        stopRatchet();
        setPointerLean(0);
        isSpinning = false;
        curAngle   = finalAngle;
        update();

        const win = sectors[finalIdx];
        let winAmount = 0;

        if (win.isFree) {
            hasFreeSpins++;
            playFree();
            charFree();
            if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
            addHistory('🎁 FREE', 'h-free');
        } else if (win.mult > 0) {
            winAmount = curBet * win.mult;
            stars    += winAmount;
            playWin();
            charWin();
            if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
            addHistory(isFree ? `🎁+${winAmount}⭐` : `${win.t} +${winAmount}⭐`, 'h-win');
        } else {
            playLose();
            charLose();
            if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('error');
            addHistory(isFree ? '🎁💀' : `-${curBet}⭐`, 'h-lose');
        }

        startHighlight(finalIdx);
        saveBalance();
        update();
    }
    requestAnimationFrame(frame);
}

function openM()  { playClick(); document.getElementById('modal').classList.add('open'); }
function closeM() { playClick(); document.getElementById('modal').classList.remove('open'); }
function setTab(t, el) {
    playClick();
    document.querySelectorAll('.tab,.tab-content').forEach(e => e.classList.remove('active'));
    document.getElementById(t).classList.add('active');
    el.classList.add('active');
}

function doDep() {
    playClick();
    const val = parseInt(document.getElementById('dep_val').value);
    if (!val || isNaN(val) || val < MIN_DEPOSIT) { alert(`Минимум ${MIN_DEPOSIT} звезд`); return; }
    tg.sendData(JSON.stringify({ action: 'deposit', amount: val, userId: userId }));
}

function calcWit() {
    const v = parseInt(document.getElementById('w_stars').value) || 0;
    document.getElementById('wit_preview').textContent =
        v > 0 ? `Вы получите: ${(v * tonPerStar).toFixed(4)} TON` : 'Вы получите: — TON';
}

function doWit() {
    playClick();
    const val  = parseInt(document.getElementById('w_stars').value);
    const addr = document.getElementById('w_addr').value.trim();
    const memo = document.getElementById('w_memo').value.trim();
    if (!addr)                           { alert('Введите адрес TON'); return; }
    if (!val || isNaN(val) || val <= 0)  { alert('Введите сумму'); return; }
    if (val < MIN_WITHDRAW)              { alert(`Минимум ${MIN_WITHDRAW} звезд`); return; }
    if (val > stars)                     { alert(`Недостаточно звезд (у вас ${stars})`); return; }
    const ton = (val * tonPerStar).toFixed(4);
    const rateText = `1 zvezda = ${tonPerStar.toFixed(6)} TON`;
    stars -= val; saveBalance(); update();
    tg.sendData(JSON.stringify({
        action: 'withdraw', stars: val, ton: ton, rate: rateText,
        address: addr, memo: memo || '-', balanceAfter: stars, userId: userId
    }));
}

function adjBet(v) {
    if (isSpinning) return;
    playClick();
    curBet = Math.max(5, curBet + v);
    update();
}

window.addEventListener('beforeunload', () => saveBalance());
window.addEventListener('DOMContentLoaded', () => {
    loadBalance();
    draw(0, -1, 0);
});
</script>
